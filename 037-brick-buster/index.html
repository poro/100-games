<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>037 - Brick Buster</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: #fff;
        }
        h1 { font-size: 1.5rem; color: #e0aaff; margin: 10px 0 5px; text-shadow: 0 0 15px rgba(224,170,255,0.4); }
        #info { display: flex; gap: 20px; margin-bottom: 8px; font-size: 1rem; }
        canvas { border-radius: 8px; box-shadow: 0 0 30px rgba(224,170,255,0.15); cursor: none; touch-action: none; }
        #message { margin-top: 10px; font-size: 1.2rem; color: #e0aaff; min-height: 28px; }
        button {
            margin-top: 8px; padding: 10px 24px; border: none; border-radius: 8px;
            background: #e0aaff; color: #0d1b2a; font-weight: bold; cursor: pointer; font-size: 1rem;
        }
    </style>
</head>
<body>
    <h1>🧱 Brick Buster</h1>
    <div id="info">
        <span>Score: <span id="score">0</span></span>
        <span>Lives: <span id="lives">3</span></span>
        <span>Level: <span id="level">1</span></span>
    </div>
    <canvas id="canvas" width="480" height="600"></canvas>
    <div id="message"></div>
    <button onclick="startGame()">Start Game</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const CW = 480, CH = 600;

        // Responsive sizing
        function fitCanvas() {
            const maxW = Math.min(window.innerWidth - 20, 480);
            const scale = maxW / 480;
            canvas.style.width = maxW + 'px';
            canvas.style.height = (600 * scale) + 'px';
        }
        window.addEventListener('resize', fitCanvas);
        fitCanvas();

        const PADDLE_W = 80, PADDLE_H = 12;
        const BALL_R = 6;
        const BRICK_ROWS = 6, BRICK_COLS = 10;
        const BRICK_W = 44, BRICK_H = 18, BRICK_GAP = 2, BRICK_OFFSET_X = 5, BRICK_OFFSET_Y = 50;

        const COLORS = ['#ff6b6b','#ffa06b','#ffd93d','#6bcb77','#4d96ff','#9b59b6'];
        const POWERUP_TYPES = ['wide', 'multi', 'fire'];

        let paddle, balls, bricks, score, lives, level, gameRunning, particles, powerups;

        function createBricks(lvl) {
            bricks = [];
            for (let r = 0; r < BRICK_ROWS; r++) {
                for (let c = 0; c < BRICK_COLS; c++) {
                    const hp = r < 2 && lvl > 1 ? 2 : 1;
                    bricks.push({
                        x: BRICK_OFFSET_X + c * (BRICK_W + BRICK_GAP),
                        y: BRICK_OFFSET_Y + r * (BRICK_H + BRICK_GAP),
                        w: BRICK_W, h: BRICK_H,
                        color: COLORS[r], hp, alive: true
                    });
                }
            }
        }

        function resetBall() {
            balls = [{ x: CW/2, y: CH - 50, vx: 3 * (Math.random() < 0.5 ? 1 : -1), vy: -4, fire: false }];
        }

        function startGame() {
            paddle = { x: CW/2 - PADDLE_W/2, w: PADDLE_W };
            score = 0; lives = 3; level = 1;
            particles = []; powerups = [];
            createBricks(1); resetBall();
            gameRunning = true;
            document.getElementById('message').textContent = '';
            updateUI();
            loop();
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('level').textContent = level;
        }

        // Input
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = CW / rect.width;
            paddle.x = (e.clientX - rect.left) * scaleX - paddle.w / 2;
            paddle.x = Math.max(0, Math.min(CW - paddle.w, paddle.x));
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = CW / rect.width;
            paddle.x = (e.touches[0].clientX - rect.left) * scaleX - paddle.w / 2;
            paddle.x = Math.max(0, Math.min(CW - paddle.w, paddle.x));
        }, { passive: false });

        function addParticles(x, y, color, count = 6) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 3;
                particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1, color, size: 2 + Math.random() * 3 });
            }
        }

        function spawnPowerup(x, y) {
            if (Math.random() > 0.2) return;
            const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
            const colors = { wide: '#ffd93d', multi: '#4d96ff', fire: '#ff6b6b' };
            powerups.push({ x, y, type, vy: 1.5, color: colors[type] });
        }

        function update() {
            if (!gameRunning) return;

            // Balls
            for (let i = balls.length - 1; i >= 0; i--) {
                const b = balls[i];
                b.x += b.vx; b.y += b.vy;

                // Wall bounce
                if (b.x - BALL_R < 0) { b.x = BALL_R; b.vx = Math.abs(b.vx); }
                if (b.x + BALL_R > CW) { b.x = CW - BALL_R; b.vx = -Math.abs(b.vx); }
                if (b.y - BALL_R < 0) { b.y = BALL_R; b.vy = Math.abs(b.vy); }

                // Paddle bounce
                if (b.vy > 0 && b.y + BALL_R >= CH - 30 && b.y + BALL_R <= CH - 18 &&
                    b.x >= paddle.x && b.x <= paddle.x + paddle.w) {
                    const hit = (b.x - paddle.x) / paddle.w - 0.5;
                    b.vx = hit * 8;
                    b.vy = -Math.abs(b.vy);
                    const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
                    const maxSpeed = 5 + level * 0.5;
                    if (speed > maxSpeed) { b.vx *= maxSpeed / speed; b.vy *= maxSpeed / speed; }
                }

                // Brick collision
                for (const brick of bricks) {
                    if (!brick.alive) continue;
                    if (b.x + BALL_R > brick.x && b.x - BALL_R < brick.x + brick.w &&
                        b.y + BALL_R > brick.y && b.y - BALL_R < brick.y + brick.h) {
                        brick.hp--;
                        if (brick.hp <= 0) {
                            brick.alive = false;
                            score += 10;
                            addParticles(brick.x + brick.w/2, brick.y + brick.h/2, brick.color);
                            spawnPowerup(brick.x + brick.w/2, brick.y + brick.h/2);
                        } else {
                            brick.color = '#888';
                        }
                        if (!b.fire) b.vy = -b.vy;
                        break;
                    }
                }

                // Ball lost
                if (b.y > CH + 20) {
                    balls.splice(i, 1);
                }
            }

            if (balls.length === 0) {
                lives--;
                updateUI();
                if (lives <= 0) {
                    gameRunning = false;
                    document.getElementById('message').textContent = `💥 Game Over! Score: ${score}`;
                    const best = parseInt(localStorage.getItem('brickbuster-best') || '0');
                    if (score > best) localStorage.setItem('brickbuster-best', score);
                    return;
                }
                paddle.w = PADDLE_W;
                resetBall();
            }

            // Powerups
            for (let i = powerups.length - 1; i >= 0; i--) {
                const p = powerups[i];
                p.y += p.vy;
                if (p.y > CH) { powerups.splice(i, 1); continue; }
                if (p.y + 10 >= CH - 30 && p.x >= paddle.x && p.x <= paddle.x + paddle.w) {
                    if (p.type === 'wide') paddle.w = Math.min(160, paddle.w + 30);
                    else if (p.type === 'multi') {
                        const newBalls = [];
                        for (const b of balls) {
                            newBalls.push({ ...b, vx: b.vx + 1.5, vy: b.vy });
                            newBalls.push({ ...b, vx: b.vx - 1.5, vy: b.vy });
                        }
                        balls.push(...newBalls);
                    }
                    else if (p.type === 'fire') balls.forEach(b => b.fire = true);
                    powerups.splice(i, 1);
                }
            }

            // Particles
            for (const p of particles) { p.x += p.vx; p.y += p.vy; p.life -= 0.03; }
            particles = particles.filter(p => p.life > 0);

            // Level complete
            if (bricks.every(b => !b.alive)) {
                level++;
                createBricks(level);
                resetBall();
                paddle.w = PADDLE_W;
                powerups = [];
                updateUI();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, CW, CH);
            ctx.fillStyle = '#0d1b2a'; ctx.fillRect(0, 0, CW, CH);

            // Bricks
            for (const b of bricks) {
                if (!b.alive) continue;
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.fillRect(b.x, b.y, b.w, 3);
            }

            // Paddle
            ctx.fillStyle = '#e0aaff';
            ctx.fillRect(paddle.x, CH - 30, paddle.w, PADDLE_H);
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.fillRect(paddle.x, CH - 30, paddle.w, 3);

            // Balls
            for (const b of balls) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, BALL_R, 0, Math.PI * 2);
                ctx.fillStyle = b.fire ? '#ff6b6b' : '#fff';
                ctx.fill();
                if (b.fire) {
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, BALL_R + 3, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255,107,107,0.4)'; ctx.lineWidth = 2; ctx.stroke();
                }
            }

            // Powerups
            for (const p of powerups) {
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#fff'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                const icons = { wide: 'W', multi: 'M', fire: 'F' };
                ctx.fillText(icons[p.type], p.x, p.y);
            }

            // Particles
            for (const p of particles) {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            }
            ctx.globalAlpha = 1;
        }

        function loop() {
            if (!gameRunning) return;
            update(); draw();
            requestAnimationFrame(loop);
        }

        // Initial draw
        draw();
    </script>
</body>
</html>

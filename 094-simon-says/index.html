<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>094 - Simon Says</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(180deg, #1a0a2e 0%, #2d1650 50%, #1a0a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            color: white;
            -webkit-user-select: none;
            user-select: none;
        }
        h1 { color: #ff6b9d; font-size: 1.8em; margin-bottom: 8px; text-shadow: 0 0 20px rgba(255,107,157,0.5); }
        .info { display: flex; gap: 20px; margin-bottom: 12px; font-size: 1.1em; align-items: center; }
        .info span { color: #ff6b9d; }
        .simon-board {
            position: relative;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            overflow: hidden;
            border: 8px solid #1a0a2e;
            box-shadow: 0 0 40px rgba(255,107,157,0.2), inset 0 0 20px rgba(0,0,0,0.3);
            margin: 10px 0;
        }
        .simon-btn {
            position: absolute;
            width: 50%;
            height: 50%;
            border: 3px solid #1a0a2e;
            cursor: pointer;
            transition: filter 0.1s;
            opacity: 0.6;
        }
        .simon-btn:active, .simon-btn.active {
            opacity: 1;
            filter: brightness(1.6);
        }
        .simon-btn.lit {
            opacity: 1;
            filter: brightness(1.8) saturate(1.3);
        }
        .simon-btn.disabled {
            cursor: default;
            pointer-events: none;
        }
        #btn-green { top: 0; left: 0; background: #2ecc71; border-radius: 100% 0 0 0; }
        #btn-red { top: 0; right: 0; background: #e74c3c; border-radius: 0 100% 0 0; }
        #btn-yellow { bottom: 0; left: 0; background: #f1c40f; border-radius: 0 0 0 100%; }
        #btn-blue { bottom: 0; right: 0; background: #3498db; border-radius: 0 0 100% 0; }
        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #1a0a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            border: 3px solid rgba(255,107,157,0.3);
        }
        .center-circle .round-num {
            font-size: 2em;
            font-weight: bold;
            color: #ff6b9d;
        }
        .center-circle .round-label {
            font-size: 0.65em;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .controls { margin-top: 15px; display: flex; gap: 10px; }
        button.action-btn {
            background: #ff6b9d; color: #1a0a2e; border: none; padding: 10px 24px;
            border-radius: 25px; font-size: 1em; font-weight: bold; cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        button.action-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,107,157,0.4); }
        .message { margin-top: 10px; font-size: 1.2em; min-height: 30px; color: #ccc; }
        .back-link { margin-top: 16px; }
        .back-link a { color: #ff6b9d; text-decoration: none; font-size: 0.95em; }
        .back-link a:hover { text-decoration: underline; }
        .streak-bar {
            display: flex;
            gap: 4px;
            margin-top: 8px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 320px;
        }
        .streak-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: rgba(255,255,255,0.1);
            transition: background 0.3s;
        }
        .streak-dot.done { background: #2ecc71; }
        .streak-dot.current { background: #ff6b9d; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
    </style>
</head>
<body>
    <h1>🎯 Simon Says</h1>
    <div class="info">
        <div>Round: <span id="round">0</span></div>
        <div>Best: <span id="best">0</span></div>
    </div>
    <div class="simon-board">
        <div class="simon-btn disabled" id="btn-green" data-color="green"></div>
        <div class="simon-btn disabled" id="btn-red" data-color="red"></div>
        <div class="simon-btn disabled" id="btn-yellow" data-color="yellow"></div>
        <div class="simon-btn disabled" id="btn-blue" data-color="blue"></div>
        <div class="center-circle">
            <div class="round-label">Round</div>
            <div class="round-num" id="centerRound">0</div>
        </div>
    </div>
    <div class="streak-bar" id="streakBar"></div>
    <div class="message" id="message">Press Start to play!</div>
    <div class="controls">
        <button class="action-btn" onclick="startGame()">▶️ Start</button>
    </div>
    <div class="back-link"><a href="../index.html">← Back to Arcade</a></div>

<script>
const COLORS = ['green', 'red', 'yellow', 'blue'];
const SOUNDS = {};

// Create AudioContext for tones
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function playTone(freq, duration = 300) {
    if (!audioCtx) audioCtx = new AudioCtx();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.value = 0.3;
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration / 1000);
    osc.start();
    osc.stop(audioCtx.currentTime + duration / 1000);
}

const TONES = { green: 392, red: 440, yellow: 330, blue: 494 };

let sequence = [];
let playerIndex = 0;
let round = 0;
let best = parseInt(localStorage.getItem('simonBest') || '0');
let isPlaying = false;
let isShowingSequence = false;
let gameActive = false;

document.getElementById('best').textContent = best;

const buttons = {};
COLORS.forEach(c => {
    const btn = document.getElementById('btn-' + c);
    buttons[c] = btn;
    btn.addEventListener('mousedown', () => handlePress(c));
    btn.addEventListener('touchstart', e => { e.preventDefault(); handlePress(c); }, { passive: false });
});

function lightUp(color, duration = 400) {
    const btn = buttons[color];
    btn.classList.add('lit');
    playTone(TONES[color], duration);
    setTimeout(() => btn.classList.remove('lit'), duration);
}

function flashError(color) {
    const btn = buttons[color];
    btn.style.filter = 'brightness(0.3)';
    // Play error buzzer
    if (!audioCtx) audioCtx = new AudioCtx();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sawtooth';
    osc.frequency.value = 100;
    gain.gain.value = 0.2;
    osc.start();
    osc.stop(audioCtx.currentTime + 0.5);
    setTimeout(() => btn.style.filter = '', 500);
}

async function showSequence() {
    isShowingSequence = true;
    setButtonsEnabled(false);
    document.getElementById('message').textContent = 'Watch carefully...';
    
    await sleep(500);
    
    const speed = Math.max(250, 500 - round * 15);
    
    for (let i = 0; i < sequence.length; i++) {
        lightUp(sequence[i], Math.min(speed - 50, 350));
        await sleep(speed);
    }
    
    isShowingSequence = false;
    setButtonsEnabled(true);
    playerIndex = 0;
    document.getElementById('message').textContent = 'Your turn! Repeat the pattern.';
}

function setButtonsEnabled(enabled) {
    COLORS.forEach(c => {
        buttons[c].classList.toggle('disabled', !enabled);
    });
}

function handlePress(color) {
    if (!gameActive || isShowingSequence) return;
    
    lightUp(color, 200);
    
    if (color === sequence[playerIndex]) {
        playerIndex++;
        updateStreak();
        
        if (playerIndex === sequence.length) {
            // Round complete!
            round++;
            updateRound();
            document.getElementById('message').textContent = '✨ Correct! Next round...';
            setButtonsEnabled(false);
            setTimeout(() => nextRound(), 1000);
        }
    } else {
        // Wrong!
        flashError(color);
        gameOver();
    }
}

function nextRound() {
    sequence.push(COLORS[Math.floor(Math.random() * 4)]);
    updateStreak();
    showSequence();
}

function updateRound() {
    document.getElementById('round').textContent = round;
    document.getElementById('centerRound').textContent = round;
}

function updateStreak() {
    const bar = document.getElementById('streakBar');
    bar.innerHTML = '';
    for (let i = 0; i < sequence.length; i++) {
        const dot = document.createElement('div');
        dot.className = 'streak-dot';
        if (i < playerIndex) dot.classList.add('done');
        else if (i === playerIndex && !isShowingSequence) dot.classList.add('current');
        bar.appendChild(dot);
    }
}

function gameOver() {
    gameActive = false;
    setButtonsEnabled(false);
    
    if (round > best) {
        best = round;
        localStorage.setItem('simonBest', best);
        document.getElementById('best').textContent = best;
        document.getElementById('message').textContent = `🏆 New Best: ${best} rounds!`;
    } else {
        document.getElementById('message').textContent = `❌ Wrong! You reached round ${round}.`;
    }
}

function startGame() {
    sequence = [];
    round = 0;
    playerIndex = 0;
    gameActive = true;
    updateRound();
    document.getElementById('streakBar').innerHTML = '';
    nextRound();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>071 - Sudoku</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f23 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
            -webkit-user-select: none;
            user-select: none;
        }
        
        h1 {
            color: #a29bfe;
            font-size: 2em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(162, 155, 254, 0.5);
        }
        
        .info {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 1.1em;
            align-items: center;
        }
        
        .info span { color: #ffd93d; }
        
        .difficulty {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .diff-btn {
            background: transparent;
            border: 2px solid #a29bfe;
            color: #a29bfe;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .diff-btn:hover, .diff-btn.active {
            background: #a29bfe;
            color: #1a1a2e;
        }
        
        .grid-container {
            position: relative;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 1px;
            background: #444;
            border: 3px solid #a29bfe;
            border-radius: 8px;
            overflow: hidden;
            width: 414px;
            max-width: calc(100vw - 40px);
        }
        
        .cell {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            font-weight: bold;
            background: #1e1e3a;
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }
        
        .cell:hover { background: #2a2a5a; }
        .cell.selected { background: #3a3a7a; box-shadow: inset 0 0 0 2px #a29bfe; }
        .cell.same-number { background: #2a2a5a; }
        .cell.given { color: #a29bfe; cursor: default; }
        .cell.user { color: #64ffda; }
        .cell.error { color: #ff6b6b; }
        .cell.highlight-row, .cell.highlight-col, .cell.highlight-box { background: #252550; }
        
        /* 3x3 box borders */
        .cell:nth-child(3n) { border-right: 2px solid #a29bfe; }
        .cell:nth-child(9n) { border-right: none; }
        .cell:nth-child(n+19):nth-child(-n+27) { border-bottom: 2px solid #a29bfe; }
        .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid #a29bfe; }
        
        .numpad {
            display: flex;
            gap: 6px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .num-btn {
            width: 44px;
            height: 44px;
            border: 2px solid #a29bfe;
            border-radius: 10px;
            background: transparent;
            color: #a29bfe;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .num-btn:hover { background: #a29bfe; color: #1a1a2e; }
        .num-btn.completed { opacity: 0.3; }
        
        .controls {
            margin-top: 12px;
            display: flex;
            gap: 10px;
        }
        
        button.ctrl-btn {
            background: #a29bfe;
            border: none;
            color: #1a1a2e;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button.ctrl-btn:hover {
            background: #c4b5fd;
            transform: translateY(-2px);
        }
        
        .status {
            margin-top: 10px;
            font-size: 1.2em;
            color: #64ffda;
            min-height: 30px;
        }
        
        .back-link {
            position: fixed;
            top: 15px;
            left: 15px;
            color: #a29bfe;
            text-decoration: none;
            font-size: 1.2em;
        }
        
        .back-link:hover { color: #c4b5fd; }
        
        .notes-mode { border-color: #ffd93d !important; color: #ffd93d !important; }
        .cell .notes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
        }
        .cell .notes span {
            font-size: 0.5em;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        @media (max-width: 460px) {
            .grid { width: calc(100vw - 40px); }
            .cell { width: calc((100vw - 50px) / 9); height: calc((100vw - 50px) / 9); font-size: 1em; }
            .num-btn { width: 38px; height: 38px; font-size: 1.1em; }
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Back</a>
    <h1>🔢 Sudoku</h1>
    <div class="info">
        <div>Time: <span id="timer">0:00</span></div>
        <div>Errors: <span id="errors">0</span>/3</div>
    </div>
    <div class="difficulty">
        <button class="diff-btn active" data-diff="easy">Easy</button>
        <button class="diff-btn" data-diff="medium">Medium</button>
        <button class="diff-btn" data-diff="hard">Hard</button>
    </div>
    <div class="grid-container">
        <div class="grid" id="grid"></div>
    </div>
    <div class="numpad" id="numpad"></div>
    <div class="controls">
        <button class="ctrl-btn" id="notesBtn" onclick="toggleNotes()">📝 Notes</button>
        <button class="ctrl-btn" onclick="eraseCell()">⌫ Erase</button>
        <button class="ctrl-btn" onclick="newGame()">🔄 New</button>
    </div>
    <div class="status" id="status"></div>

    <script>
        let solution = [];
        let puzzle = [];
        let userBoard = [];
        let notes = Array(81).fill(null).map(() => new Set());
        let selectedCell = -1;
        let notesMode = false;
        let errorCount = 0;
        let timerInterval = null;
        let seconds = 0;
        let difficulty = 'easy';
        let gameActive = false;
        
        const REMOVE_COUNT = { easy: 35, medium: 45, hard: 55 };
        
        // Generate a valid solved Sudoku
        function generateSolution() {
            const grid = Array(9).fill(null).map(() => Array(9).fill(0));
            
            function isValid(grid, row, col, num) {
                for (let i = 0; i < 9; i++) {
                    if (grid[row][i] === num || grid[i][col] === num) return false;
                }
                const br = Math.floor(row / 3) * 3, bc = Math.floor(col / 3) * 3;
                for (let r = br; r < br + 3; r++) {
                    for (let c = bc; c < bc + 3; c++) {
                        if (grid[r][c] === num) return false;
                    }
                }
                return true;
            }
            
            function solve(grid) {
                for (let r = 0; r < 9; r++) {
                    for (let c = 0; c < 9; c++) {
                        if (grid[r][c] === 0) {
                            const nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
                            for (const n of nums) {
                                if (isValid(grid, r, c, n)) {
                                    grid[r][c] = n;
                                    if (solve(grid)) return true;
                                    grid[r][c] = 0;
                                }
                            }
                            return false;
                        }
                    }
                }
                return true;
            }
            
            solve(grid);
            return grid;
        }
        
        function newGame() {
            solution = generateSolution();
            puzzle = solution.map(row => [...row]);
            
            // Remove cells
            const toRemove = REMOVE_COUNT[difficulty];
            let removed = 0;
            const cells = [];
            for (let i = 0; i < 81; i++) cells.push(i);
            cells.sort(() => Math.random() - 0.5);
            
            for (const idx of cells) {
                if (removed >= toRemove) break;
                const r = Math.floor(idx / 9), c = idx % 9;
                puzzle[r][c] = 0;
                removed++;
            }
            
            userBoard = puzzle.map(row => [...row]);
            notes = Array(81).fill(null).map(() => new Set());
            selectedCell = -1;
            errorCount = 0;
            seconds = 0;
            gameActive = true;
            notesMode = false;
            document.getElementById('notesBtn').classList.remove('notes-mode');
            document.getElementById('errors').textContent = '0';
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                seconds++;
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
            }, 1000);
            
            document.getElementById('status').textContent = '';
            renderGrid();
            renderNumpad();
        }
        
        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    const idx = r * 9 + c;
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.idx = idx;
                    
                    const val = userBoard[r][c];
                    const isGiven = puzzle[r][c] !== 0;
                    
                    if (isGiven) {
                        cell.classList.add('given');
                        cell.textContent = val;
                    } else if (val !== 0) {
                        cell.classList.add('user');
                        cell.textContent = val;
                        // Check if wrong
                        if (val !== solution[r][c]) cell.classList.add('error');
                    } else if (notes[idx].size > 0) {
                        const notesDiv = document.createElement('div');
                        notesDiv.className = 'notes';
                        for (let n = 1; n <= 9; n++) {
                            const s = document.createElement('span');
                            s.textContent = notes[idx].has(n) ? n : '';
                            notesDiv.appendChild(s);
                        }
                        cell.appendChild(notesDiv);
                    }
                    
                    if (idx === selectedCell) {
                        cell.classList.add('selected');
                    }
                    
                    // Highlight same number
                    if (selectedCell >= 0) {
                        const sr = Math.floor(selectedCell / 9), sc = selectedCell % 9;
                        const selVal = userBoard[sr][sc];
                        if (selVal && val === selVal && idx !== selectedCell) {
                            cell.classList.add('same-number');
                        }
                        // Highlight row/col/box
                        if (r === sr && idx !== selectedCell) cell.classList.add('highlight-row');
                        if (c === sc && idx !== selectedCell) cell.classList.add('highlight-col');
                        if (Math.floor(r/3) === Math.floor(sr/3) && Math.floor(c/3) === Math.floor(sc/3) && idx !== selectedCell) {
                            cell.classList.add('highlight-box');
                        }
                    }
                    
                    cell.addEventListener('click', () => selectCell(idx));
                    grid.appendChild(cell);
                }
            }
        }
        
        function renderNumpad() {
            const numpad = document.getElementById('numpad');
            numpad.innerHTML = '';
            
            // Count how many of each number are placed
            const counts = {};
            for (let n = 1; n <= 9; n++) counts[n] = 0;
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    if (userBoard[r][c]) counts[userBoard[r][c]]++;
                }
            }
            
            for (let n = 1; n <= 9; n++) {
                const btn = document.createElement('button');
                btn.className = 'num-btn';
                if (counts[n] >= 9) btn.classList.add('completed');
                btn.textContent = n;
                btn.addEventListener('click', () => placeNumber(n));
                numpad.appendChild(btn);
            }
        }
        
        function selectCell(idx) {
            selectedCell = idx;
            renderGrid();
        }
        
        function placeNumber(num) {
            if (!gameActive || selectedCell < 0) return;
            const r = Math.floor(selectedCell / 9), c = selectedCell % 9;
            if (puzzle[r][c] !== 0) return; // given cell
            
            if (notesMode) {
                if (notes[selectedCell].has(num)) notes[selectedCell].delete(num);
                else notes[selectedCell].add(num);
                userBoard[r][c] = 0;
                renderGrid();
                return;
            }
            
            notes[selectedCell].clear();
            userBoard[r][c] = num;
            
            if (num !== solution[r][c]) {
                errorCount++;
                document.getElementById('errors').textContent = errorCount;
                if (errorCount >= 3) {
                    gameActive = false;
                    clearInterval(timerInterval);
                    document.getElementById('status').textContent = '💀 Game Over! Too many errors.';
                    document.getElementById('status').style.color = '#ff6b6b';
                }
            } else {
                // Remove this number from notes in same row/col/box
                for (let i = 0; i < 9; i++) {
                    notes[r * 9 + i].delete(num);
                    notes[i * 9 + c].delete(num);
                }
                const br = Math.floor(r / 3) * 3, bc = Math.floor(c / 3) * 3;
                for (let dr = 0; dr < 3; dr++) {
                    for (let dc = 0; dc < 3; dc++) {
                        notes[(br + dr) * 9 + (bc + dc)].delete(num);
                    }
                }
            }
            
            renderGrid();
            renderNumpad();
            checkWin();
        }
        
        function eraseCell() {
            if (!gameActive || selectedCell < 0) return;
            const r = Math.floor(selectedCell / 9), c = selectedCell % 9;
            if (puzzle[r][c] !== 0) return;
            userBoard[r][c] = 0;
            notes[selectedCell].clear();
            renderGrid();
            renderNumpad();
        }
        
        function toggleNotes() {
            notesMode = !notesMode;
            document.getElementById('notesBtn').classList.toggle('notes-mode', notesMode);
        }
        
        function checkWin() {
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    if (userBoard[r][c] !== solution[r][c]) return;
                }
            }
            gameActive = false;
            clearInterval(timerInterval);
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            document.getElementById('status').textContent = `🏆 Solved in ${m}:${s.toString().padStart(2, '0')}!`;
            document.getElementById('status').style.color = '#64ffda';
        }
        
        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            const num = parseInt(e.key);
            if (num >= 1 && num <= 9) {
                placeNumber(num);
            } else if (e.key === 'Backspace' || e.key === 'Delete') {
                eraseCell();
            } else if (e.key === 'n' || e.key === 'N') {
                toggleNotes();
            } else if (selectedCell >= 0) {
                const r = Math.floor(selectedCell / 9), c = selectedCell % 9;
                if (e.key === 'ArrowUp' && r > 0) selectCell((r-1)*9+c);
                if (e.key === 'ArrowDown' && r < 8) selectCell((r+1)*9+c);
                if (e.key === 'ArrowLeft' && c > 0) selectCell(r*9+(c-1));
                if (e.key === 'ArrowRight' && c < 8) selectCell(r*9+(c+1));
            }
        });
        
        // Difficulty buttons
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                difficulty = btn.dataset.diff;
                newGame();
            });
        });
        
        newGame();
    </script>
</body>
</html>

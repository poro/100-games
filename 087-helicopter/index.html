<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>087 - Helicopter Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(180deg, #1a0a2e 0%, #2d1650 50%, #1a0a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            color: white;
            -webkit-user-select: none;
            user-select: none;
        }
        h1 { color: #ff6b9d; font-size: 1.8em; margin-bottom: 8px; text-shadow: 0 0 20px rgba(255,107,157,0.5); }
        .info { display: flex; gap: 20px; margin-bottom: 12px; font-size: 1.1em; align-items: center; }
        .info span { color: #ff6b9d; }
        canvas {
            border-radius: 12px;
            border: 2px solid rgba(255,107,157,0.2);
            background: #1a1a3e;
            display: block;
        }
        .controls { margin-top: 12px; display: flex; gap: 10px; }
        button.action-btn {
            background: #ff6b9d; color: #1a0a2e; border: none; padding: 10px 24px;
            border-radius: 25px; font-size: 1em; font-weight: bold; cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        button.action-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,107,157,0.4); }
        .back-link { margin-top: 16px; }
        .back-link a { color: #ff6b9d; text-decoration: none; font-size: 0.95em; }
        .back-link a:hover { text-decoration: underline; }
        #message { margin-top: 8px; font-size: 0.95em; color: #ccc; min-height: 1.2em; }
    </style>
</head>
<body>
    <h1>🚁 Helicopter Game</h1>
    <div class="info">
        <div>Distance: <span id="score">0</span></div>
        <div>Best: <span id="best">0</span></div>
    </div>
    <canvas id="game"></canvas>
    <div id="message">Hold click/tap or spacebar to fly up!</div>
    <div class="controls">
        <button class="action-btn" onclick="startGame()">🔄 Restart</button>
    </div>
    <div class="back-link"><a href="../index.html">← Back to Arcade</a></div>

    <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const W = Math.min(480, window.innerWidth - 30);
    const H = Math.min(360, window.innerHeight - 250);
    canvas.width = W;
    canvas.height = H;

    let best = parseInt(localStorage.getItem('heli_best') || '0');
    document.getElementById('best').textContent = best;

    // Game state
    let heli, obstacles, particles, caveTop, caveBottom, score, gameOver, gameStarted, holding, speed, frame;
    const GRAVITY = 0.35;
    const LIFT = -0.65;
    const HELI_SIZE = 16;
    const GAP_MIN = 120;
    const GAP_MAX = 180;

    function init() {
        heli = { x: 80, y: H / 2, vy: 0 };
        obstacles = [];
        particles = [];
        caveTop = [];
        caveBottom = [];
        score = 0;
        gameOver = false;
        gameStarted = false;
        holding = false;
        speed = 2;
        frame = 0;

        // Init cave walls
        let topY = 30;
        let botY = H - 30;
        for (let i = 0; i <= W + 20; i += 10) {
            topY += (Math.random() - 0.5) * 8;
            topY = Math.max(10, Math.min(80, topY));
            botY += (Math.random() - 0.5) * 8;
            botY = Math.max(H - 80, Math.min(H - 10, botY));
            caveTop.push(topY);
            caveBottom.push(botY);
        }

        document.getElementById('score').textContent = '0';
        document.getElementById('message').textContent = 'Hold click/tap or spacebar to fly up!';
    }

    function spawnObstacle() {
        const gap = GAP_MIN + Math.random() * (GAP_MAX - GAP_MIN);
        const minTop = caveTop[caveTop.length - 1] + 20;
        const maxTop = caveBottom[caveBottom.length - 1] - gap - 20;
        const topH = minTop + Math.random() * (maxTop - minTop);
        obstacles.push({
            x: W + 10,
            topH: topH,
            gap: gap,
            w: 25 + Math.random() * 15,
            passed: false
        });
    }

    function addParticles(x, y) {
        for (let i = 0; i < 8; i++) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4,
                life: 20 + Math.random() * 15,
                color: ['#ff6b9d', '#ffaa00', '#ff4444'][Math.floor(Math.random() * 3)]
            });
        }
    }

    function update() {
        if (gameOver) return;
        frame++;

        // Speed ramp
        speed = 2 + score * 0.003;

        // Physics
        if (holding && gameStarted) {
            heli.vy += LIFT;
        }
        heli.vy += GRAVITY;
        heli.vy = Math.max(-6, Math.min(6, heli.vy));
        heli.y += heli.vy;

        // Scroll cave
        caveTop.shift();
        caveBottom.shift();
        let lastTop = caveTop[caveTop.length - 1] + (Math.random() - 0.5) * 10;
        let lastBot = caveBottom[caveBottom.length - 1] + (Math.random() - 0.5) * 10;
        // Gradually narrow
        const narrow = Math.min(score * 0.02, 30);
        lastTop = Math.max(10 + narrow, Math.min(100 + narrow, lastTop));
        lastBot = Math.max(H - 100 - narrow, Math.min(H - 10 - narrow, lastBot));
        caveTop.push(lastTop);
        caveBottom.push(lastBot);

        // Obstacles
        if (frame % Math.max(40, 80 - Math.floor(score / 5)) === 0) {
            spawnObstacle();
        }
        for (let ob of obstacles) {
            ob.x -= speed;
            if (!ob.passed && ob.x + ob.w < heli.x) {
                ob.passed = true;
                score++;
                document.getElementById('score').textContent = score;
            }
        }
        obstacles = obstacles.filter(o => o.x + o.w > -10);

        // Trail particles
        if (frame % 3 === 0 && gameStarted) {
            particles.push({
                x: heli.x - HELI_SIZE,
                y: heli.y + (Math.random() - 0.5) * 6,
                vx: -1 - Math.random(),
                vy: (Math.random() - 0.5) * 2,
                life: 12 + Math.random() * 8,
                color: holding ? '#ffaa00' : '#4488ff'
            });
        }

        // Update particles
        for (let p of particles) {
            p.x += p.vx;
            p.y += p.vy;
            p.life--;
        }
        particles = particles.filter(p => p.life > 0);

        // Collision with cave
        const idx = Math.floor(heli.x / 10);
        if (idx >= 0 && idx < caveTop.length) {
            if (heli.y - HELI_SIZE / 2 < caveTop[idx] || heli.y + HELI_SIZE / 2 > caveBottom[idx]) {
                endGame();
                return;
            }
        }

        // Collision with obstacles
        for (let ob of obstacles) {
            if (heli.x + HELI_SIZE / 2 > ob.x && heli.x - HELI_SIZE / 2 < ob.x + ob.w) {
                if (heli.y - HELI_SIZE / 2 < ob.topH || heli.y + HELI_SIZE / 2 > ob.topH + ob.gap) {
                    endGame();
                    return;
                }
            }
        }

        // Off screen
        if (heli.y < 0 || heli.y > H) {
            endGame();
        }
    }

    function endGame() {
        gameOver = true;
        addParticles(heli.x, heli.y);
        if (score > best) {
            best = score;
            localStorage.setItem('heli_best', best);
            document.getElementById('best').textContent = best;
            document.getElementById('message').textContent = '🏆 New Record! ' + best;
        } else {
            document.getElementById('message').textContent = '💥 Crashed! Distance: ' + score;
        }
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);

        // Background stars
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        for (let i = 0; i < 30; i++) {
            const sx = (i * 97 + frame * 0.3) % W;
            const sy = (i * 53 + i * i) % H;
            ctx.fillRect(sx, sy, 1, 1);
        }

        // Cave walls
        ctx.fillStyle = '#2a1548';
        ctx.beginPath();
        ctx.moveTo(0, 0);
        for (let i = 0; i < caveTop.length; i++) {
            ctx.lineTo(i * 10, caveTop[i]);
        }
        ctx.lineTo(W, 0);
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(0, H);
        for (let i = 0; i < caveBottom.length; i++) {
            ctx.lineTo(i * 10, caveBottom[i]);
        }
        ctx.lineTo(W, H);
        ctx.fill();

        // Cave wall outlines
        ctx.strokeStyle = '#ff6b9d44';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < caveTop.length; i++) {
            i === 0 ? ctx.moveTo(0, caveTop[i]) : ctx.lineTo(i * 10, caveTop[i]);
        }
        ctx.stroke();
        ctx.beginPath();
        for (let i = 0; i < caveBottom.length; i++) {
            i === 0 ? ctx.moveTo(0, caveBottom[i]) : ctx.lineTo(i * 10, caveBottom[i]);
        }
        ctx.stroke();

        // Obstacles
        for (let ob of obstacles) {
            const grad = ctx.createLinearGradient(ob.x, 0, ob.x + ob.w, 0);
            grad.addColorStop(0, '#ff4466');
            grad.addColorStop(1, '#cc2244');
            ctx.fillStyle = grad;
            // Top pillar
            ctx.fillRect(ob.x, caveTop[Math.floor(ob.x / 10)] || 0, ob.w, ob.topH - (caveTop[Math.floor(ob.x / 10)] || 0));
            // Bottom pillar
            ctx.fillRect(ob.x, ob.topH + ob.gap, ob.w, (caveBottom[Math.floor(ob.x / 10)] || H) - ob.topH - ob.gap);
        }

        // Particles
        for (let p of particles) {
            ctx.globalAlpha = p.life / 25;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
        }
        ctx.globalAlpha = 1;

        // Helicopter
        if (!gameOver) {
            ctx.save();
            ctx.translate(heli.x, heli.y);
            ctx.rotate(heli.vy * 0.05);
            // Body
            ctx.fillStyle = '#44ddff';
            ctx.beginPath();
            ctx.ellipse(0, 0, HELI_SIZE, HELI_SIZE * 0.6, 0, 0, Math.PI * 2);
            ctx.fill();
            // Cockpit
            ctx.fillStyle = '#aaeeff';
            ctx.beginPath();
            ctx.ellipse(6, -2, 6, 5, 0, 0, Math.PI * 2);
            ctx.fill();
            // Rotor
            ctx.strokeStyle = '#ffffff88';
            ctx.lineWidth = 2;
            const rotorPhase = frame * 0.5;
            ctx.beginPath();
            ctx.moveTo(-14 * Math.cos(rotorPhase), -HELI_SIZE * 0.7);
            ctx.lineTo(14 * Math.cos(rotorPhase), -HELI_SIZE * 0.7);
            ctx.stroke();
            // Tail
            ctx.fillStyle = '#44ddff';
            ctx.fillRect(-HELI_SIZE - 4, -3, 8, 6);
            ctx.restore();
        }

        // Game over overlay
        if (gameOver) {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#ff6b9d';
            ctx.font = 'bold 28px Segoe UI, system-ui';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', W / 2, H / 2 - 10);
            ctx.font = '18px Segoe UI, system-ui';
            ctx.fillStyle = '#fff';
            ctx.fillText('Distance: ' + score, W / 2, H / 2 + 20);
        }

        // Start overlay
        if (!gameStarted && !gameOver) {
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#ff6b9d';
            ctx.font = 'bold 22px Segoe UI, system-ui';
            ctx.textAlign = 'center';
            ctx.fillText('HOLD TO FLY', W / 2, H / 2);
            ctx.font = '14px Segoe UI, system-ui';
            ctx.fillStyle = '#ccc';
            ctx.fillText('Avoid walls and obstacles', W / 2, H / 2 + 25);
        }
    }

    function loop() {
        if (gameStarted) update();
        draw();
        requestAnimationFrame(loop);
    }

    function startGame() {
        init();
        gameStarted = true;
        document.getElementById('message').textContent = '';
    }

    // Input
    function press() {
        holding = true;
        if (!gameStarted && !gameOver) {
            gameStarted = true;
            document.getElementById('message').textContent = '';
        }
        if (gameOver) startGame();
    }
    function release() { holding = false; }

    canvas.addEventListener('mousedown', press);
    canvas.addEventListener('mouseup', release);
    canvas.addEventListener('mouseleave', release);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); press(); });
    canvas.addEventListener('touchend', e => { e.preventDefault(); release(); });
    document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); press(); } });
    document.addEventListener('keyup', e => { if (e.code === 'Space') release(); });

    init();
    loop();
    </script>
</body>
</html>

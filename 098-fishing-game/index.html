<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>098 - Fishing Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(180deg, #1a0a2e 0%, #2d1650 50%, #1a0a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            color: white;
            -webkit-user-select: none;
            user-select: none;
        }
        h1 { color: #ff6b9d; font-size: 1.8em; margin-bottom: 8px; text-shadow: 0 0 20px rgba(255,107,157,0.5); }
        .info { display: flex; gap: 20px; margin-bottom: 12px; font-size: 1.1em; align-items: center; flex-wrap: wrap; justify-content: center; }
        .info span { color: #ff6b9d; }
        canvas { border-radius: 16px; border: 2px solid rgba(255,107,157,0.2); touch-action: none; }
        .controls { margin-top: 12px; display: flex; gap: 10px; }
        button.action-btn {
            background: #ff6b9d; color: #1a0a2e; border: none; padding: 10px 24px;
            border-radius: 25px; font-size: 1em; font-weight: bold; cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        button.action-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,107,157,0.4); }
        .message { margin-top: 8px; font-size: 1.2em; min-height: 30px; color: #ccc; text-align: center; }
        .back-link { margin-top: 16px; }
        .back-link a { color: #ff6b9d; text-decoration: none; font-size: 0.95em; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>🎣 Fishing Game</h1>
    <div class="info">
        <div>Score: <span id="score">0</span></div>
        <div>Catch: <span id="catch">0</span></div>
        <div>Time: <span id="time">60</span>s</div>
        <div>Best: <span id="best">0</span></div>
    </div>
    <canvas id="game" width="440" height="560"></canvas>
    <div class="message" id="message">Click/tap to cast your line. Reel in when a fish bites! 🐟</div>
    <div class="controls">
        <button class="action-btn" onclick="startGame()">🔄 New Game</button>
    </div>
    <div class="back-link"><a href="../index.html">← Back to Arcade</a></div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let best = parseInt(localStorage.getItem('fishingBest') || '0');
document.getElementById('best').textContent = best;

const WATER_Y = 180;
const FISH_TYPES = [
    { emoji: '🐟', name: 'Bluegill', points: 10, speed: 1.5, size: 20, color: '#4fc3f7', rarity: 0.4 },
    { emoji: '🐠', name: 'Clownfish', points: 25, speed: 2, size: 22, color: '#ff9800', rarity: 0.25 },
    { emoji: '🐡', name: 'Pufferfish', points: 40, speed: 1, size: 28, color: '#ffd54f', rarity: 0.15 },
    { emoji: '🦈', name: 'Shark', points: 75, speed: 3, size: 36, color: '#78909c', rarity: 0.1 },
    { emoji: '🐙', name: 'Octopus', points: 100, speed: 1.5, size: 32, color: '#ab47bc', rarity: 0.07 },
    { emoji: '🐋', name: 'Whale', points: 200, speed: 0.8, size: 48, color: '#5c6bc0', rarity: 0.03 },
];

let fish, hook, score, catches, timeLeft, gameOver, gameStarted, state, reelProgress, caughtFish, bubbles, ripples, timer;

function spawnFish() {
    const count = 8 + Math.floor(Math.random() * 5);
    fish = [];
    for (let i = 0; i < count; i++) {
        const r = Math.random();
        let cumulative = 0;
        let type = FISH_TYPES[0];
        for (const t of FISH_TYPES) {
            cumulative += t.rarity;
            if (r <= cumulative) { type = t; break; }
        }
        fish.push({
            ...type,
            x: Math.random() * W,
            y: WATER_Y + 40 + Math.random() * (H - WATER_Y - 80),
            dir: Math.random() < 0.5 ? 1 : -1,
            phase: Math.random() * Math.PI * 2,
            interested: false,
            biting: false
        });
    }
}

function startGame() {
    score = 0;
    catches = 0;
    timeLeft = 60;
    gameOver = false;
    gameStarted = true;
    state = 'idle'; // idle, casting, waiting, bite, reeling
    hook = { x: W / 2, y: 100, targetY: 0, vy: 0 };
    reelProgress = 0;
    caughtFish = null;
    bubbles = [];
    ripples = [];
    spawnFish();
    
    if (timer) clearInterval(timer);
    timer = setInterval(() => {
        if (gameStarted && !gameOver) {
            timeLeft--;
            document.getElementById('time').textContent = timeLeft;
            if (timeLeft <= 0) {
                gameOver = true;
                if (score > best) {
                    best = score;
                    localStorage.setItem('fishingBest', best);
                    document.getElementById('best').textContent = best;
                }
                document.getElementById('message').textContent = `⏰ Time's up! Score: ${score} (${catches} fish)`;
                document.getElementById('message').style.color = '#ffd700';
            }
        }
    }, 1000);
    
    document.getElementById('message').textContent = 'Click/tap to cast your line! 🎣';
    document.getElementById('message').style.color = '#ccc';
}

function castLine(x, y) {
    if (state !== 'idle' || gameOver) return;
    state = 'casting';
    hook.x = Math.min(W - 20, Math.max(20, x));
    hook.targetY = Math.min(H - 30, Math.max(WATER_Y + 40, y));
    hook.y = WATER_Y - 20;
    hook.vy = 4;
    
    ripples.push({ x: hook.x, y: WATER_Y, radius: 5, maxRadius: 30, alpha: 1 });
}

function reelIn() {
    if (state === 'bite' && caughtFish) {
        state = 'reeling';
        reelProgress = 0;
    }
}

function update() {
    if (!gameStarted || gameOver) return;
    
    // Casting animation
    if (state === 'casting') {
        hook.y += hook.vy;
        if (hook.y >= hook.targetY) {
            hook.y = hook.targetY;
            state = 'waiting';
            // Add bubble
            for (let i = 0; i < 5; i++) {
                bubbles.push({ x: hook.x + (Math.random() - 0.5) * 10, y: hook.y, vy: -0.5 - Math.random(), life: 40 + Math.random() * 30, size: 2 + Math.random() * 4 });
            }
        }
    }
    
    // Waiting for bite
    if (state === 'waiting') {
        fish.forEach(f => {
            const dist = Math.hypot(f.x - hook.x, f.y - hook.y);
            if (dist < 60 && !f.interested && Math.random() < 0.005) {
                f.interested = true;
            }
            if (f.interested) {
                // Swim toward hook
                const dx = hook.x - f.x, dy = hook.y - f.y;
                const d = Math.hypot(dx, dy);
                if (d > 5) {
                    f.x += (dx / d) * f.speed;
                    f.y += (dy / d) * f.speed * 0.5;
                    f.dir = dx > 0 ? 1 : -1;
                }
                if (d < 15 && !f.biting) {
                    f.biting = true;
                    state = 'bite';
                    caughtFish = f;
                    document.getElementById('message').textContent = `🐟 BITE! Click/tap to REEL IN! (${f.name})`;
                    document.getElementById('message').style.color = '#ffd700';
                    // Auto-lose if not reeled in 3s
                    setTimeout(() => {
                        if (state === 'bite' && caughtFish === f) {
                            f.interested = false;
                            f.biting = false;
                            caughtFish = null;
                            state = 'idle';
                            hook.y = 100;
                            document.getElementById('message').textContent = 'Too slow! Fish got away. Cast again!';
                            document.getElementById('message').style.color = '#f87171';
                        }
                    }, 3000);
                }
            }
        });
    }
    
    // Reeling
    if (state === 'reeling' && caughtFish) {
        reelProgress += 0.02;
        hook.y -= 3;
        caughtFish.x += (hook.x - caughtFish.x) * 0.1;
        caughtFish.y = hook.y;
        
        if (hook.y < WATER_Y - 30) {
            // Caught!
            score += caughtFish.points;
            catches++;
            document.getElementById('message').textContent = `🎉 Caught a ${caughtFish.name}! +${caughtFish.points} pts`;
            document.getElementById('message').style.color = '#4ade80';
            
            // Remove fish and respawn
            fish = fish.filter(f => f !== caughtFish);
            caughtFish = null;
            state = 'idle';
            hook.y = 100;
            
            // Spawn new fish
            if (fish.length < 6) {
                const r = Math.random();
                let cumulative = 0, type = FISH_TYPES[0];
                for (const t of FISH_TYPES) { cumulative += t.rarity; if (r <= cumulative) { type = t; break; } }
                fish.push({
                    ...type,
                    x: Math.random() < 0.5 ? -20 : W + 20,
                    y: WATER_Y + 40 + Math.random() * (H - WATER_Y - 80),
                    dir: Math.random() < 0.5 ? 1 : -1,
                    phase: Math.random() * Math.PI * 2,
                    interested: false, biting: false
                });
            }
            
            document.getElementById('score').textContent = score;
            document.getElementById('catch').textContent = catches;
        }
    }
    
    // Fish movement
    fish.forEach(f => {
        if (f.biting || f.interested) return;
        f.x += f.dir * f.speed * 0.5;
        f.y += Math.sin(f.phase + Date.now() * 0.002) * 0.3;
        if (f.x < -50) { f.x = W + 50; f.dir = -1; }
        if (f.x > W + 50) { f.x = -50; f.dir = 1; }
    });
    
    // Bubbles
    bubbles = bubbles.filter(b => {
        b.y += b.vy;
        b.x += (Math.random() - 0.5) * 0.5;
        b.life--;
        return b.life > 0 && b.y > WATER_Y;
    });
    
    // Random bubbles
    if (Math.random() < 0.05) {
        bubbles.push({
            x: 20 + Math.random() * (W - 40),
            y: H - 10,
            vy: -0.3 - Math.random() * 0.5,
            life: 80 + Math.random() * 60,
            size: 2 + Math.random() * 3
        });
    }
    
    // Ripples
    ripples = ripples.filter(r => {
        r.radius += 0.5;
        r.alpha -= 0.02;
        return r.alpha > 0;
    });
}

function draw() {
    // Sky
    const skyGrad = ctx.createLinearGradient(0, 0, 0, WATER_Y);
    skyGrad.addColorStop(0, '#ff7043');
    skyGrad.addColorStop(0.5, '#ffab91');
    skyGrad.addColorStop(1, '#4fc3f7');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, WATER_Y);
    
    // Sun
    ctx.fillStyle = '#fff176';
    ctx.beginPath();
    ctx.arc(W - 80, 60, 35, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff9c4';
    ctx.beginPath();
    ctx.arc(W - 80, 60, 28, 0, Math.PI * 2);
    ctx.fill();
    
    // Clouds
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    [[60, 40], [200, 70], [340, 50]].forEach(([cx, cy]) => {
        ctx.beginPath();
        ctx.arc(cx, cy, 20, 0, Math.PI * 2);
        ctx.arc(cx + 20, cy - 8, 16, 0, Math.PI * 2);
        ctx.arc(cx - 15, cy + 2, 14, 0, Math.PI * 2);
        ctx.fill();
    });
    
    // Water
    const waterGrad = ctx.createLinearGradient(0, WATER_Y, 0, H);
    waterGrad.addColorStop(0, '#1565c0');
    waterGrad.addColorStop(0.3, '#0d47a1');
    waterGrad.addColorStop(1, '#0a1929');
    ctx.fillStyle = waterGrad;
    ctx.fillRect(0, WATER_Y, W, H - WATER_Y);
    
    // Water surface waves
    ctx.strokeStyle = 'rgba(100, 200, 255, 0.3)';
    ctx.lineWidth = 2;
    for (let w = 0; w < 3; w++) {
        ctx.beginPath();
        for (let x = 0; x <= W; x += 5) {
            const y = WATER_Y + w * 3 + Math.sin(x * 0.03 + Date.now() * 0.002 + w) * 3;
            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
    }
    
    // Bubbles
    bubbles.forEach(b => {
        ctx.strokeStyle = `rgba(150, 220, 255, ${b.life / 100})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
        ctx.stroke();
    });
    
    // Fish
    fish.forEach(f => {
        if (f.y < WATER_Y) return;
        ctx.save();
        ctx.translate(f.x, f.y);
        if (f.dir < 0) ctx.scale(-1, 1);
        
        // Body
        ctx.fillStyle = f.color;
        ctx.beginPath();
        ctx.ellipse(0, 0, f.size / 2, f.size / 3, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Tail
        ctx.beginPath();
        ctx.moveTo(-f.size / 2, 0);
        ctx.lineTo(-f.size / 2 - 8, -6);
        ctx.lineTo(-f.size / 2 - 8, 6);
        ctx.closePath();
        ctx.fill();
        
        // Eye
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(f.size / 4, -2, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'black';
        ctx.beginPath();
        ctx.arc(f.size / 4 + 1, -2, 1.5, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.restore();
    });
    
    // Fishing line
    if (state !== 'idle' && hook) {
        // Rod at top
        ctx.strokeStyle = '#8d6e63';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(W / 2 - 40, WATER_Y - 60);
        ctx.lineTo(hook.x, WATER_Y - 30);
        ctx.stroke();
        
        // Line
        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(hook.x, WATER_Y - 30);
        ctx.lineTo(hook.x, hook.y);
        ctx.stroke();
        
        // Hook
        ctx.fillStyle = '#bdbdbd';
        ctx.beginPath();
        ctx.arc(hook.x, hook.y, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#bdbdbd';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(hook.x, hook.y + 4, 4, 0, Math.PI);
        ctx.stroke();
    }
    
    // Ripples
    ripples.forEach(r => {
        ctx.strokeStyle = `rgba(150, 220, 255, ${r.alpha})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(r.x, r.y, r.radius, r.radius * 0.3, 0, 0, Math.PI * 2);
        ctx.stroke();
    });
    
    // Bite indicator
    if (state === 'bite') {
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 24px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('! BITE !', hook.x, hook.y - 25);
    }
    
    if (!gameStarted) {
        ctx.fillStyle = '#fff';
        ctx.font = '20px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Press New Game to start!', W / 2, H / 2);
    }
}

// Input
canvas.addEventListener('click', e => {
    if (gameOver) return;
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (W / rect.width);
    const y = (e.clientY - rect.top) * (H / rect.height);
    
    if (state === 'idle') castLine(x, y);
    else if (state === 'bite') reelIn();
});

canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (gameOver) return;
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    const x = (t.clientX - rect.left) * (W / rect.width);
    const y = (t.clientY - rect.top) * (H / rect.height);
    
    if (state === 'idle') castLine(x, y);
    else if (state === 'bite') reelIn();
});

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

startGame();
gameLoop();
</script>
</body>
</html>

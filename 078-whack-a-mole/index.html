<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>078 - Whack-a-Mole</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(180deg, #2d5016 0%, #1a3a0a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
            -webkit-user-select: none;
            user-select: none;
        }
        h1 { color: #a8e063; font-size: 2em; margin-bottom: 10px; text-shadow: 0 0 20px rgba(168, 224, 99, 0.5); }
        .info { display: flex; gap: 20px; margin-bottom: 15px; font-size: 1.1em; align-items: center; }
        .info span { color: #ffd93d; }
        .speed-selector { display: flex; gap: 8px; margin-bottom: 15px; }
        .sp-btn {
            background: transparent; border: 2px solid #a8e063; color: #a8e063;
            padding: 6px 16px; border-radius: 20px; font-size: 0.9em; cursor: pointer; transition: all 0.2s;
        }
        .sp-btn:hover, .sp-btn.active { background: #a8e063; color: #1a3a0a; }
        .game-area {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
            padding: 30px; background: rgba(168, 224, 99, 0.05);
            border-radius: 16px; border: 2px solid rgba(168, 224, 99, 0.15);
        }
        .hole {
            width: 100px; height: 100px; background: radial-gradient(ellipse at center, #3d2b1f 0%, #2a1a0e 100%);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; overflow: hidden;
            border: 3px solid #5a3d2b; transition: transform 0.05s;
        }
        .hole:active { transform: scale(0.95); }
        .mole {
            font-size: 48px; position: absolute; bottom: -60px;
            transition: bottom 0.15s ease-out; pointer-events: none;
        }
        .hole.active .mole { bottom: 10px; }
        .hole.whacked .mole { bottom: 10px; opacity: 0.5; }
        .hole.golden .mole { filter: drop-shadow(0 0 8px gold); }
        .hit-effect {
            position: absolute; font-size: 24px; animation: hitPop 0.4s ease-out forwards;
            pointer-events: none; z-index: 10;
        }
        @keyframes hitPop {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.5) translateY(-30px); opacity: 0; }
        }
        .status { font-size: 1.2em; min-height: 1.5em; color: #dfe6e9; margin-top: 15px; }
        .controls { margin-top: 15px; display: flex; gap: 10px; }
        button.action-btn {
            background: #a8e063; color: #1a3a0a; border: none; padding: 10px 24px;
            border-radius: 25px; font-size: 1em; font-weight: bold; cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        button.action-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(168, 224, 99, 0.4); }
        .timer-bar {
            width: 300px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px;
            margin-top: 10px; overflow: hidden;
        }
        .timer-fill {
            height: 100%; background: linear-gradient(90deg, #e17055, #ffd93d, #a8e063);
            border-radius: 4px; transition: width 0.1s linear;
        }
        .how-to {
            max-width: 600px; margin-top: 20px; padding: 15px 20px;
            background: rgba(168, 224, 99, 0.08); border-radius: 12px;
            border: 1px solid rgba(168, 224, 99, 0.2); font-size: 0.95em; color: #ccc; line-height: 1.6;
        }
        .how-to strong { color: #a8e063; }
        .back-link { position: fixed; top: 15px; left: 15px; color: #a8e063; text-decoration: none; font-size: 1.4em; z-index: 100; }
        .win-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            justify-content: center; align-items: center; flex-direction: column; z-index: 200;
        }
        .win-overlay.show { display: flex; }
        .win-overlay h2 { font-size: 3em; margin-bottom: 10px; }
        .win-overlay p { font-size: 1.3em; color: #ccc; margin-bottom: 20px; }
        .high-score { font-size: 0.95em; color: #b2bec3; margin-bottom: 10px; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Back</a>
    <h1>🔨 Whack-a-Mole</h1>
    <div class="high-score">Best: <span id="best">0</span></div>
    <div class="info">Score: <span id="score">0</span> &nbsp;|&nbsp; Time: <span id="time">30</span>s</div>
    <div class="speed-selector">
        <button class="sp-btn" onclick="setSpeed('easy')">Easy</button>
        <button class="sp-btn active" onclick="setSpeed('normal')">Normal</button>
        <button class="sp-btn" onclick="setSpeed('hard')">Hard</button>
    </div>
    <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
    <div class="game-area" id="gameArea"></div>
    <div class="status" id="status">Click Start to play!</div>
    <div class="controls">
        <button class="action-btn" id="startBtn" onclick="startGame()">Start</button>
    </div>
    <div class="how-to">
        <strong>How to play:</strong> Moles pop up from holes — <strong>click them</strong> to score!
        Regular moles = <strong>1 point</strong>. Golden moles ✨ = <strong>3 points</strong>.
        Don't miss — you have <strong>30 seconds</strong>. Higher difficulty = faster moles!
    </div>

    <div class="win-overlay" id="winOverlay">
        <h2 id="winTitle">⏰ Time's Up!</h2>
        <p id="winMsg"></p>
        <button class="action-btn" onclick="startGame()">Play Again</button>
    </div>

    <script>
        const HOLES = 9;
        const GAME_TIME = 30;
        let score = 0, best = 0, timeLeft = 0, gameActive = false;
        let moleTimer = null, gameTimer = null, tickTimer = null;
        let currentSpeed = 'normal';
        const speeds = { easy: { min: 900, max: 1600, show: 1200 }, normal: { min: 500, max: 1100, show: 800 }, hard: { min: 300, max: 700, show: 500 } };

        function buildGrid() {
            let html = '';
            for (let i = 0; i < HOLES; i++) {
                html += `<div class="hole" id="hole${i}" onclick="whack(${i})"><div class="mole" id="mole${i}">🐹</div></div>`;
            }
            document.getElementById('gameArea').innerHTML = html;
        }

        function setSpeed(s) {
            currentSpeed = s;
            document.querySelectorAll('.sp-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === s));
        }

        function startGame() {
            score = 0; timeLeft = GAME_TIME; gameActive = true;
            document.getElementById('score').textContent = '0';
            document.getElementById('time').textContent = timeLeft;
            document.getElementById('timerFill').style.width = '100%';
            document.getElementById('winOverlay').classList.remove('show');
            document.getElementById('status').textContent = 'Whack the moles!';
            document.getElementById('startBtn').textContent = 'Restart';
            buildGrid();
            clearTimers();
            popMole();
            tickTimer = setInterval(tick, 1000);
        }

        function tick() {
            timeLeft--;
            document.getElementById('time').textContent = timeLeft;
            document.getElementById('timerFill').style.width = (timeLeft / GAME_TIME * 100) + '%';
            if (timeLeft <= 0) endGame();
        }

        function popMole() {
            if (!gameActive) return;
            const sp = speeds[currentSpeed];

            // Clear all active
            document.querySelectorAll('.hole').forEach(h => { h.classList.remove('active', 'golden', 'whacked'); });

            // Pick 1-2 random holes
            const count = Math.random() < 0.2 ? 2 : 1;
            const chosen = [];
            while (chosen.length < count) {
                const r = Math.floor(Math.random() * HOLES);
                if (!chosen.includes(r)) chosen.push(r);
            }

            chosen.forEach(idx => {
                const hole = document.getElementById('hole' + idx);
                hole.classList.add('active');
                if (Math.random() < 0.15) hole.classList.add('golden');
            });

            // Hide after show time
            setTimeout(() => {
                chosen.forEach(idx => {
                    const hole = document.getElementById('hole' + idx);
                    if (hole.classList.contains('active') && !hole.classList.contains('whacked')) {
                        hole.classList.remove('active', 'golden');
                    }
                });
            }, sp.show);

            const delay = sp.min + Math.random() * (sp.max - sp.min);
            moleTimer = setTimeout(popMole, delay);
        }

        function whack(idx) {
            if (!gameActive) return;
            const hole = document.getElementById('hole' + idx);
            if (!hole.classList.contains('active') || hole.classList.contains('whacked')) return;

            const pts = hole.classList.contains('golden') ? 3 : 1;
            score += pts;
            document.getElementById('score').textContent = score;
            hole.classList.add('whacked');
            hole.classList.remove('active');

            // Hit effect
            const eff = document.createElement('div');
            eff.className = 'hit-effect';
            eff.textContent = pts === 3 ? '✨+3' : '💥+1';
            hole.appendChild(eff);
            setTimeout(() => eff.remove(), 400);

            setTimeout(() => hole.classList.remove('whacked', 'golden'), 200);
        }

        function endGame() {
            gameActive = false;
            clearTimers();
            if (score > best) best = score;
            document.getElementById('best').textContent = best;
            document.getElementById('winTitle').textContent = score >= 30 ? '🏆 Amazing!' : score >= 15 ? '👏 Nice Job!' : '⏰ Time\'s Up!';
            document.getElementById('winMsg').textContent = `You scored ${score} points!${score > best - 1 ? ' New best!' : ''}`;
            document.getElementById('winOverlay').classList.add('show');
        }

        function clearTimers() {
            clearTimeout(moleTimer);
            clearInterval(tickTimer);
        }

        buildGrid();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>097 - Platformer Runner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(180deg, #1a0a2e 0%, #2d1650 50%, #1a0a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            color: white;
            -webkit-user-select: none;
            user-select: none;
        }
        h1 { color: #ff6b9d; font-size: 1.8em; margin-bottom: 8px; text-shadow: 0 0 20px rgba(255,107,157,0.5); }
        .info { display: flex; gap: 20px; margin-bottom: 12px; font-size: 1.1em; align-items: center; }
        .info span { color: #ff6b9d; }
        canvas { border-radius: 16px; border: 2px solid rgba(255,107,157,0.2); touch-action: none; }
        .controls { margin-top: 12px; display: flex; gap: 10px; }
        button.action-btn {
            background: #ff6b9d; color: #1a0a2e; border: none; padding: 10px 24px;
            border-radius: 25px; font-size: 1em; font-weight: bold; cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        button.action-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,107,157,0.4); }
        .message { margin-top: 8px; font-size: 1.2em; min-height: 30px; color: #ccc; }
        .back-link { margin-top: 16px; }
        .back-link a { color: #ff6b9d; text-decoration: none; font-size: 0.95em; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>🏃 Platformer Runner</h1>
    <div class="info">
        <div>Score: <span id="score">0</span></div>
        <div>Coins: <span id="coins">0</span></div>
        <div>Best: <span id="best">0</span></div>
    </div>
    <canvas id="game" width="440" height="560"></canvas>
    <div class="message" id="message">↑/Space to jump, ← → to move. Collect coins, avoid enemies!</div>
    <div class="controls">
        <button class="action-btn" onclick="startGame()">🔄 New Run</button>
    </div>
    <div class="back-link"><a href="../index.html">← Back to Arcade</a></div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let best = parseInt(localStorage.getItem('platformBest') || '0');
document.getElementById('best').textContent = best;

let player, platforms, coins, enemies, particles, score, coinCount, scrollX, gameOver, gameStarted;
const GRAVITY = 0.5;
const JUMP_FORCE = -11;
const MOVE_SPEED = 4;
const GROUND_Y = H - 40;

function startGame() {
    player = { x: 60, y: GROUND_Y - 30, vy: 0, vx: 0, w: 24, h: 28, onGround: false, facing: 1, jumpCount: 0 };
    platforms = [];
    coins = [];
    enemies = [];
    particles = [];
    score = 0;
    coinCount = 0;
    scrollX = 0;
    gameOver = false;
    gameStarted = true;
    
    // Generate initial platforms
    generateWorld(0, W * 3);
    
    document.getElementById('message').textContent = '↑/Space to jump, ← → to move. Collect coins!';
    document.getElementById('message').style.color = '#ccc';
}

function generateWorld(fromX, toX) {
    for (let x = fromX; x < toX; x += 60 + Math.random() * 100) {
        const y = GROUND_Y - 60 - Math.random() * 200;
        const w = 60 + Math.random() * 80;
        platforms.push({ x, y, w, h: 12 });
        
        // Coins on platforms
        if (Math.random() < 0.7) {
            const numCoins = 1 + Math.floor(Math.random() * 3);
            for (let i = 0; i < numCoins; i++) {
                coins.push({ x: x + 10 + i * 20, y: y - 20, collected: false, bobPhase: Math.random() * Math.PI * 2 });
            }
        }
        
        // Enemies on some platforms
        if (Math.random() < 0.3 && w > 70) {
            enemies.push({ x: x + 10, y: y - 20, w: 20, h: 20, dir: 1, minX: x, maxX: x + w - 20, speed: 1 + Math.random() });
        }
    }
}

function update() {
    if (!gameStarted || gameOver) return;
    
    // Player movement
    if (keys['ArrowLeft'] || keys['a']) { player.vx = -MOVE_SPEED; player.facing = -1; }
    else if (keys['ArrowRight'] || keys['d']) { player.vx = MOVE_SPEED; player.facing = 1; }
    else { player.vx *= 0.8; }
    
    // Gravity
    player.vy += GRAVITY;
    player.x += player.vx;
    player.y += player.vy;
    
    player.onGround = false;
    
    // Ground collision
    if (player.y + player.h >= GROUND_Y) {
        player.y = GROUND_Y - player.h;
        player.vy = 0;
        player.onGround = true;
        player.jumpCount = 0;
    }
    
    // Platform collision (only from above)
    platforms.forEach(p => {
        const px = p.x - scrollX;
        if (player.x + player.w > px && player.x < px + p.w &&
            player.y + player.h >= p.y && player.y + player.h <= p.y + p.h + 8 && player.vy >= 0) {
            player.y = p.y - player.h;
            player.vy = 0;
            player.onGround = true;
            player.jumpCount = 0;
        }
    });
    
    // Scroll camera
    const targetScroll = player.x - W * 0.3;
    if (targetScroll > scrollX) scrollX += (targetScroll - scrollX) * 0.1;
    
    // Score from distance
    score = Math.max(score, Math.floor(scrollX / 10));
    
    // Coin collection
    coins.forEach(c => {
        if (c.collected) return;
        const cx = c.x - scrollX, cy = c.y + Math.sin(c.bobPhase + Date.now() * 0.005) * 4;
        if (Math.abs(player.x + player.w / 2 - cx) < 18 && Math.abs(player.y + player.h / 2 - cy) < 18) {
            c.collected = true;
            coinCount++;
            score += 10;
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: cx, y: cy,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 1) * 4,
                    life: 15 + Math.random() * 10, maxLife: 25,
                    color: '#ffd700'
                });
            }
        }
    });
    
    // Enemy movement & collision
    enemies.forEach(e => {
        const ex = e.x - scrollX;
        e.x += e.dir * e.speed;
        if (e.x <= e.minX || e.x >= e.maxX) e.dir *= -1;
        
        // Collision with player
        if (player.x + player.w > ex && player.x < ex + e.w &&
            player.y + player.h > e.y && player.y < e.y + e.h) {
            // Stomping from above?
            if (player.vy > 0 && player.y + player.h < e.y + e.h / 2 + 5) {
                player.vy = JUMP_FORCE * 0.7;
                e.dead = true;
                score += 25;
                for (let i = 0; i < 10; i++) {
                    particles.push({
                        x: ex + e.w / 2, y: e.y,
                        vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 1) * 5,
                        life: 20, maxLife: 20, color: '#f87171'
                    });
                }
            } else {
                // Die
                gameOver = true;
                if (score > best) {
                    best = score;
                    localStorage.setItem('platformBest', best);
                    document.getElementById('best').textContent = best;
                }
                document.getElementById('message').textContent = `💀 Game Over! Score: ${score}`;
                document.getElementById('message').style.color = '#f87171';
            }
        }
    });
    enemies = enemies.filter(e => !e.dead);
    
    // Fall off screen
    if (player.y > H + 50) {
        gameOver = true;
        if (score > best) {
            best = score;
            localStorage.setItem('platformBest', best);
            document.getElementById('best').textContent = best;
        }
        document.getElementById('message').textContent = `💀 Fell! Score: ${score}`;
        document.getElementById('message').style.color = '#f87171';
    }
    
    // Generate more world
    const worldEnd = platforms.length ? Math.max(...platforms.map(p => p.x + p.w)) : 0;
    if (worldEnd < scrollX + W * 3) {
        generateWorld(worldEnd, worldEnd + W * 2);
    }
    
    // Clean up off-screen objects
    platforms = platforms.filter(p => p.x + p.w > scrollX - W);
    coins = coins.filter(c => !c.collected && c.x > scrollX - W);
    enemies = enemies.filter(e => e.x > scrollX - W);
    
    // Particles
    particles = particles.filter(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
        return p.life > 0;
    });
    
    document.getElementById('score').textContent = score;
    document.getElementById('coins').textContent = coinCount;
}

function draw() {
    // Sky gradient
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#1a0a3e');
    grad.addColorStop(0.6, '#2d1650');
    grad.addColorStop(1, '#1a3a1e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    
    // Background mountains
    ctx.fillStyle = 'rgba(50, 30, 80, 0.5)';
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let x = 0; x <= W; x += 30) {
        const mY = H - 100 - Math.sin((x + scrollX * 0.2) * 0.01) * 60 - Math.sin((x + scrollX * 0.2) * 0.02) * 30;
        ctx.lineTo(x, mY);
    }
    ctx.lineTo(W, H);
    ctx.fill();
    
    if (!gameStarted) {
        ctx.fillStyle = '#ccc';
        ctx.font = '20px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Press New Run to start!', W / 2, H / 2);
        return;
    }
    
    // Ground
    ctx.fillStyle = '#2a5a2a';
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
    ctx.fillStyle = '#3a7a3a';
    ctx.fillRect(0, GROUND_Y, W, 4);
    
    // Platforms
    platforms.forEach(p => {
        const px = p.x - scrollX;
        if (px > -p.w && px < W + p.w) {
            ctx.fillStyle = '#6a4a2a';
            ctx.fillRect(px, p.y, p.w, p.h);
            ctx.fillStyle = '#4a8a4a';
            ctx.fillRect(px, p.y, p.w, 3);
        }
    });
    
    // Coins
    coins.forEach(c => {
        if (c.collected) return;
        const cx = c.x - scrollX;
        const cy = c.y + Math.sin(c.bobPhase + Date.now() * 0.005) * 4;
        if (cx > -20 && cx < W + 20) {
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(cx, cy, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ffaa00';
            ctx.beginPath();
            ctx.arc(cx, cy, 5, 0, Math.PI * 2);
            ctx.fill();
        }
    });
    
    // Enemies
    enemies.forEach(e => {
        const ex = e.x - scrollX;
        if (ex > -30 && ex < W + 30) {
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(ex, e.y, e.w, e.h);
            // Eyes
            ctx.fillStyle = 'white';
            ctx.fillRect(ex + 4, e.y + 4, 5, 5);
            ctx.fillRect(ex + 12, e.y + 4, 5, 5);
            ctx.fillStyle = 'black';
            ctx.fillRect(ex + (e.dir > 0 ? 7 : 5), e.y + 5, 2, 3);
            ctx.fillRect(ex + (e.dir > 0 ? 15 : 13), e.y + 5, 2, 3);
        }
    });
    
    // Player
    if (player) {
        ctx.save();
        ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
        if (player.facing < 0) ctx.scale(-1, 1);
        
        // Body
        ctx.fillStyle = '#4fc3f7';
        ctx.fillRect(-player.w / 2, -player.h / 2, player.w, player.h);
        
        // Eyes
        ctx.fillStyle = 'white';
        ctx.fillRect(2, -player.h / 2 + 6, 7, 7);
        ctx.fillStyle = 'black';
        ctx.fillRect(5, -player.h / 2 + 8, 3, 4);
        
        // Hat
        ctx.fillStyle = '#e74c3c';
        ctx.fillRect(-player.w / 2, -player.h / 2 - 4, player.w, 6);
        ctx.fillRect(-player.w / 2 + 4, -player.h / 2 - 8, player.w - 4, 6);
        
        ctx.restore();
    }
    
    // Particles
    particles.forEach(p => {
        const alpha = p.life / p.maxLife;
        ctx.fillStyle = p.color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
    });
}

const keys = {};
document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if ((e.key === 'ArrowUp' || e.key === ' ' || e.key === 'w') && player && !gameOver) {
        if (player.jumpCount < 2) {
            player.vy = JUMP_FORCE;
            player.jumpCount++;
            player.onGround = false;
        }
    }
    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch: tap to jump
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (!gameStarted) return;
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const x = touch.clientX - rect.left;
    
    if (player && !gameOver) {
        if (x < W / 3) { keys['ArrowLeft'] = true; }
        else if (x > W * 2 / 3) { keys['ArrowRight'] = true; }
        else {
            if (player.jumpCount < 2) {
                player.vy = JUMP_FORCE;
                player.jumpCount++;
            }
        }
    }
});
canvas.addEventListener('touchend', e => {
    keys['ArrowLeft'] = false;
    keys['ArrowRight'] = false;
});

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

startGame();
gameLoop();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>034 - Fruit Ninja</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #1a1a2e; overflow: hidden;
        }
        canvas { display: block; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; padding: 15px 20px;
            display: flex; justify-content: space-between; color: #fff; font-size: 1.2rem;
            pointer-events: none; z-index: 10;
        }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.7); z-index: 20; color: #fff;
        }
        #overlay.hidden { display: none; }
        #overlay h1 { font-size: 2.5rem; color: #ff6b6b; margin-bottom: 10px; }
        #overlay p { font-size: 1.3rem; margin-bottom: 20px; }
        #overlay button {
            padding: 12px 30px; border: none; border-radius: 8px;
            background: #64ffda; color: #1a1a2e; font-size: 1.1rem; font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="ui">
        <span>🍉 Score: <span id="score">0</span></span>
        <span>❌ Misses: <span id="misses">0</span>/3</span>
    </div>
    <canvas id="canvas"></canvas>
    <div id="overlay">
        <h1>🍉 Fruit Ninja</h1>
        <p>Swipe or drag to slice fruit! Avoid bombs 💣</p>
        <button onclick="startGame()">Play</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const FRUITS = ['🍎','🍊','🍋','🍇','🍉','🍑','🍓','🥝','🍌','🫐'];
        const BOMB = '💣';

        let fruits = [], sliceTrail = [], particles = [], score, misses, gameRunning, spawnTimer;

        function spawnFruit() {
            if (!gameRunning) return;
            const count = 1 + Math.floor(Math.random() * 3);
            for (let i = 0; i < count; i++) {
                const isBomb = Math.random() < 0.15;
                const x = 50 + Math.random() * (W - 100);
                const vx = (Math.random() - 0.5) * 4;
                const vy = -(12 + Math.random() * 6);
                fruits.push({
                    x, y: H + 30, vx, vy,
                    emoji: isBomb ? BOMB : FRUITS[Math.floor(Math.random() * FRUITS.length)],
                    isBomb, radius: 28, sliced: false, rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.15
                });
            }
            const delay = 800 + Math.random() * 1200 - Math.min(score * 5, 500);
            spawnTimer = setTimeout(spawnFruit, Math.max(400, delay));
        }

        function addParticles(x, y, emoji) {
            for (let i = 0; i < 8; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 4;
                particles.push({
                    x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                    life: 1, emoji: emoji, size: 12 + Math.random() * 10
                });
            }
        }

        let mouseDown = false, lastMouse = null;

        function handleMove(x, y) {
            if (!gameRunning) return;
            sliceTrail.push({ x, y, life: 1 });
            if (sliceTrail.length > 20) sliceTrail.shift();

            for (const f of fruits) {
                if (f.sliced) continue;
                const dx = f.x - x, dy = f.y - y;
                if (Math.sqrt(dx*dx + dy*dy) < f.radius + 15) {
                    f.sliced = true;
                    if (f.isBomb) {
                        misses = 3;
                        document.getElementById('misses').textContent = misses;
                        endGame(); return;
                    }
                    score++;
                    document.getElementById('score').textContent = score;
                    addParticles(f.x, f.y, f.emoji);
                }
            }
        }

        canvas.addEventListener('mousedown', (e) => { mouseDown = true; lastMouse = { x: e.clientX, y: e.clientY }; });
        canvas.addEventListener('mouseup', () => { mouseDown = false; lastMouse = null; });
        canvas.addEventListener('mousemove', (e) => { if (mouseDown) handleMove(e.clientX, e.clientY); });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); const t = e.touches[0]; handleMove(t.clientX, t.clientY); }, { passive: false });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); const t = e.touches[0]; handleMove(t.clientX, t.clientY); }, { passive: false });

        function update() {
            for (const f of fruits) {
                f.vy += 0.35; // gravity
                f.x += f.vx; f.y += f.vy;
                f.rotation += f.rotSpeed;
            }
            // Remove fallen unsliced fruits
            const before = fruits.filter(f => !f.sliced && f.y < H + 50).length;
            fruits = fruits.filter(f => f.y < H + 80 || f.sliced);
            const after = fruits.filter(f => !f.sliced).length;
            const missed = before - after - fruits.filter(f => f.sliced && f.y >= H + 50).length;

            // Count missed (non-bomb fruits that fell off screen)
            for (let i = fruits.length - 1; i >= 0; i--) {
                if (!fruits[i].sliced && fruits[i].y > H + 50 && !fruits[i].isBomb) {
                    misses++;
                    document.getElementById('misses').textContent = misses;
                    fruits.splice(i, 1);
                    if (misses >= 3) { endGame(); return; }
                }
            }
            fruits = fruits.filter(f => !(f.sliced && f.y > H + 50));

            // Particles
            for (const p of particles) {
                p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.02;
            }
            particles = particles.filter(p => p.life > 0);

            // Slice trail fade
            for (const s of sliceTrail) s.life -= 0.06;
            sliceTrail = sliceTrail.filter(s => s.life > 0);
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            // Background gradient
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#16213e'); grad.addColorStop(1, '#1a1a2e');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

            // Slice trail
            if (sliceTrail.length > 1) {
                ctx.beginPath();
                ctx.moveTo(sliceTrail[0].x, sliceTrail[0].y);
                for (const s of sliceTrail) ctx.lineTo(s.x, s.y);
                ctx.strokeStyle = 'rgba(100, 255, 218, 0.6)';
                ctx.lineWidth = 3; ctx.stroke();
            }

            // Fruits
            for (const f of fruits) {
                if (f.sliced) continue;
                ctx.save();
                ctx.translate(f.x, f.y);
                ctx.rotate(f.rotation);
                ctx.font = '40px serif';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(f.emoji, 0, 0);
                ctx.restore();
            }

            // Particles
            for (const p of particles) {
                ctx.globalAlpha = p.life;
                ctx.font = `${p.size}px serif`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(p.emoji, p.x, p.y);
            }
            ctx.globalAlpha = 1;
        }

        function gameLoop() {
            if (!gameRunning) return;
            update(); draw();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            score = 0; misses = 0; fruits = []; particles = []; sliceTrail = [];
            document.getElementById('score').textContent = '0';
            document.getElementById('misses').textContent = '0';
            document.getElementById('overlay').classList.add('hidden');
            gameRunning = true;
            spawnFruit();
            gameLoop();
        }

        function endGame() {
            gameRunning = false;
            clearTimeout(spawnTimer);
            const ov = document.getElementById('overlay');
            ov.classList.remove('hidden');
            ov.querySelector('h1').textContent = '💥 Game Over';
            ov.querySelector('p').textContent = `Score: ${score}`;
            ov.querySelector('button').textContent = 'Play Again';
            const best = localStorage.getItem('fruit-ninja-best') || 0;
            if (score > best) localStorage.setItem('fruit-ninja-best', score);
        }
    </script>
</body>
</html>

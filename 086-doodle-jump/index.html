<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>086 - Doodle Jump</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(180deg, #1a0a2e 0%, #2d1650 50%, #1a0a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            color: white;
            -webkit-user-select: none;
            user-select: none;
        }
        h1 { color: #ff6b9d; font-size: 1.8em; margin-bottom: 8px; text-shadow: 0 0 20px rgba(255,107,157,0.5); }
        .info { display: flex; gap: 20px; margin-bottom: 12px; font-size: 1.1em; align-items: center; }
        .info span { color: #ff6b9d; }
        canvas {
            border-radius: 12px;
            border: 2px solid rgba(255,107,157,0.2);
            background: #e8f4e8;
            display: block;
        }
        .controls { margin-top: 12px; display: flex; gap: 10px; }
        button.action-btn {
            background: #ff6b9d; color: #1a0a2e; border: none; padding: 10px 24px;
            border-radius: 25px; font-size: 1em; font-weight: bold; cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        button.action-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,107,157,0.4); }
        .mobile-controls {
            display: none;
            margin-top: 10px;
            gap: 20px;
        }
        .mobile-btn {
            width: 70px; height: 70px;
            border-radius: 50%;
            background: rgba(255,107,157,0.3);
            border: 2px solid rgba(255,107,157,0.5);
            color: white;
            font-size: 2em;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .mobile-btn:active { background: rgba(255,107,157,0.6); }
        @media (max-width: 600px) { .mobile-controls { display: flex; } }
        .back-link { margin-top: 16px; }
        .back-link a { color: #ff6b9d; text-decoration: none; font-size: 0.95em; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>🐸 Doodle Jump</h1>
    <div class="info">
        <div>Score: <span id="score">0</span></div>
        <div>Best: <span id="best">0</span></div>
    </div>
    <canvas id="game"></canvas>
    <div class="mobile-controls">
        <div class="mobile-btn" id="leftBtn">◀</div>
        <div class="mobile-btn" id="rightBtn">▶</div>
    </div>
    <div class="controls">
        <button class="action-btn" onclick="startGame()">🔄 Restart</button>
    </div>
    <div class="back-link"><a href="../index.html">← Back to Arcade</a></div>

    <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const W = Math.min(360, window.innerWidth - 30);
    const H = Math.min(560, window.innerHeight - 250);
    canvas.width = W; canvas.height = H;

    let player, platforms, score, bestScore, gameOver, scrollOffset, keys;
    bestScore = parseInt(localStorage.getItem('doodlejump_best') || '0');
    document.getElementById('best').textContent = bestScore;

    const GRAVITY = 0.35;
    const JUMP_FORCE = -10;
    const MOVE_SPEED = 5;
    const PLAT_W = 65;
    const PLAT_H = 12;
    const PLAYER_W = 30;
    const PLAYER_H = 30;

    function init() {
        player = { x: W / 2 - PLAYER_W / 2, y: H - 100, vy: JUMP_FORCE, vx: 0, facing: 1 };
        platforms = [];
        score = 0;
        scrollOffset = 0;
        gameOver = false;
        keys = {};

        // Generate initial platforms
        platforms.push({ x: W / 2 - PLAT_W / 2, y: H - 50, type: 'normal' }); // Starting platform
        for (let i = 1; i < 15; i++) {
            addPlatform(H - 50 - i * (H / 12));
        }
    }

    function addPlatform(y) {
        const x = Math.random() * (W - PLAT_W);
        let type = 'normal';
        const r = Math.random();
        if (score > 500 && r < 0.08) type = 'breaking';
        else if (score > 200 && r < 0.15) type = 'moving';
        else if (r < 0.06) type = 'spring';
        platforms.push({ x, y, type, dir: 1, broken: false });
    }

    function update() {
        if (gameOver) return;

        // Movement
        let moving = false;
        if (keys['ArrowLeft'] || keys['a'] || keys['mobileLeft']) { player.vx = -MOVE_SPEED; player.facing = -1; moving = true; }
        else if (keys['ArrowRight'] || keys['d'] || keys['mobileRight']) { player.vx = MOVE_SPEED; player.facing = 1; moving = true; }
        else { player.vx *= 0.8; }

        player.x += player.vx;
        player.vy += GRAVITY;
        player.y += player.vy;

        // Wrap around
        if (player.x + PLAYER_W < 0) player.x = W;
        if (player.x > W) player.x = -PLAYER_W;

        // Moving platforms
        for (const p of platforms) {
            if (p.type === 'moving') {
                p.x += p.dir * 1.5;
                if (p.x <= 0 || p.x + PLAT_W >= W) p.dir *= -1;
            }
        }

        // Collision with platforms (only when falling)
        if (player.vy > 0) {
            for (const p of platforms) {
                if (p.broken) continue;
                if (player.x + PLAYER_W > p.x && player.x < p.x + PLAT_W &&
                    player.y + PLAYER_H >= p.y && player.y + PLAYER_H <= p.y + PLAT_H + player.vy + 2) {
                    if (p.type === 'breaking') {
                        p.broken = true;
                        continue;
                    }
                    player.y = p.y - PLAYER_H;
                    player.vy = p.type === 'spring' ? JUMP_FORCE * 1.6 : JUMP_FORCE;
                }
            }
        }

        // Scroll screen when player is above middle
        if (player.y < H / 3) {
            const shift = H / 3 - player.y;
            player.y = H / 3;
            scrollOffset += shift;
            score = Math.max(score, Math.floor(scrollOffset / 10));

            for (const p of platforms) p.y += shift;

            // Remove off-screen platforms, add new ones
            platforms = platforms.filter(p => p.y < H + 50);
            while (platforms.length < 12) {
                const topY = Math.min(...platforms.map(p => p.y));
                addPlatform(topY - (60 + Math.random() * 40));
            }
        }

        // Fall off screen
        if (player.y > H + 50) {
            gameOver = true;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('doodlejump_best', bestScore);
                document.getElementById('best').textContent = bestScore;
            }
        }

        document.getElementById('score').textContent = score;
    }

    function draw() {
        // Sky gradient
        const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
        skyGrad.addColorStop(0, '#87CEEB');
        skyGrad.addColorStop(1, '#e8f4e8');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, W, H);

        // Platforms
        for (const p of platforms) {
            if (p.broken) {
                // Broken platform fragments
                ctx.fillStyle = '#c0392b';
                ctx.fillRect(p.x, p.y + 5, PLAT_W * 0.4, PLAT_H * 0.6);
                ctx.fillRect(p.x + PLAT_W * 0.5, p.y + 10, PLAT_W * 0.4, PLAT_H * 0.6);
                p.y += 3;
                continue;
            }
            
            let color;
            switch (p.type) {
                case 'normal': color = '#27ae60'; break;
                case 'moving': color = '#3498db'; break;
                case 'breaking': color = '#e67e22'; break;
                case 'spring': color = '#27ae60'; break;
            }
            
            // Platform shadow
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            roundRect(ctx, p.x + 2, p.y + 3, PLAT_W, PLAT_H, 5);
            
            ctx.fillStyle = color;
            roundRect(ctx, p.x, p.y, PLAT_W, PLAT_H, 5);
            
            // Highlight
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            roundRect(ctx, p.x + 3, p.y + 2, PLAT_W - 6, PLAT_H / 2, 3);

            // Spring
            if (p.type === 'spring') {
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(p.x + PLAT_W/2 - 5, p.y - 10, 10, 10);
                ctx.fillStyle = '#f39c12';
                ctx.fillRect(p.x + PLAT_W/2 - 3, p.y - 8, 6, 6);
            }
        }

        // Player (simple doodle character)
        const px = player.x, py = player.y;
        const dir = player.facing;
        
        // Body
        ctx.fillStyle = '#2ecc71';
        roundRect(ctx, px + 3, py + 8, PLAYER_W - 6, PLAYER_H - 8, 6);
        
        // Head
        ctx.fillStyle = '#2ecc71';
        ctx.beginPath();
        ctx.arc(px + PLAYER_W/2, py + 6, 10, 0, Math.PI * 2);
        ctx.fill();
        
        // Eyes
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(px + PLAYER_W/2 + dir * 3 - 3, py + 4, 4, 0, Math.PI * 2);
        ctx.arc(px + PLAYER_W/2 + dir * 3 + 3, py + 4, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(px + PLAYER_W/2 + dir * 4 - 3, py + 4, 2, 0, Math.PI * 2);
        ctx.arc(px + PLAYER_W/2 + dir * 4 + 3, py + 4, 2, 0, Math.PI * 2);
        ctx.fill();
        
        // Nose
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath();
        ctx.arc(px + PLAYER_W/2 + dir * 8, py + 6, 3, 0, Math.PI * 2);
        ctx.fill();

        // Legs
        ctx.fillStyle = '#27ae60';
        if (player.vy > 0) {
            // Falling - legs up
            ctx.fillRect(px + 5, py + PLAYER_H - 3, 8, 5);
            ctx.fillRect(px + PLAYER_W - 13, py + PLAYER_H - 3, 8, 5);
        } else {
            // Jumping - legs down
            ctx.fillRect(px + 5, py + PLAYER_H - 1, 8, 8);
            ctx.fillRect(px + PLAYER_W - 13, py + PLAYER_H - 1, 8, 8);
        }

        // Game over overlay
        if (gameOver) {
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 36px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Game Over!', W/2, H/2 - 30);
            ctx.font = '24px sans-serif';
            ctx.fillStyle = '#ffd700';
            ctx.fillText(`Score: ${score}`, W/2, H/2 + 10);
            if (score === bestScore && score > 0) {
                ctx.fillStyle = '#ff6b9d';
                ctx.font = '20px sans-serif';
                ctx.fillText('🎉 New Best! 🎉', W/2, H/2 + 45);
            }
            ctx.fillStyle = '#aaa';
            ctx.font = '16px sans-serif';
            ctx.fillText('Tap restart or press Space', W/2, H/2 + 80);
        }
    }

    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.fill();
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function startGame() {
        init();
    }

    // Keyboard
    document.addEventListener('keydown', e => {
        keys[e.key] = true;
        if (e.key === ' ' && gameOver) startGame();
    });
    document.addEventListener('keyup', e => keys[e.key] = false);

    // Mobile tilt controls
    if (window.DeviceOrientationEvent) {
        window.addEventListener('deviceorientation', e => {
            if (e.gamma !== null) {
                if (e.gamma < -5) keys['ArrowLeft'] = true;
                else keys['ArrowLeft'] = false;
                if (e.gamma > 5) keys['ArrowRight'] = true;
                else keys['ArrowRight'] = false;
            }
        });
    }

    // Mobile buttons
    const leftBtn = document.getElementById('leftBtn');
    const rightBtn = document.getElementById('rightBtn');
    leftBtn.addEventListener('touchstart', e => { e.preventDefault(); keys['mobileLeft'] = true; });
    leftBtn.addEventListener('touchend', e => { e.preventDefault(); keys['mobileLeft'] = false; });
    rightBtn.addEventListener('touchstart', e => { e.preventDefault(); keys['mobileRight'] = true; });
    rightBtn.addEventListener('touchend', e => { e.preventDefault(); keys['mobileRight'] = false; });

    // Tap to restart on canvas
    canvas.addEventListener('click', () => { if (gameOver) startGame(); });

    init();
    gameLoop();
    </script>
</body>
</html>

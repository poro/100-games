<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>089 - Reaction Time</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(180deg, #1a0a2e 0%, #2d1650 50%, #1a0a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            color: white;
            -webkit-user-select: none;
            user-select: none;
        }
        h1 { color: #ff6b9d; font-size: 1.8em; margin-bottom: 8px; text-shadow: 0 0 20px rgba(255,107,157,0.5); }
        .info { display: flex; gap: 20px; margin-bottom: 12px; font-size: 1.1em; align-items: center; }
        .info span { color: #ff6b9d; }
        .game-area {
            width: min(440px, 95vw);
            border-radius: 16px;
            border: 2px solid rgba(255,107,157,0.2);
            overflow: hidden;
        }
        .target-zone {
            height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.15s;
            -webkit-tap-highlight-color: transparent;
            padding: 20px;
            text-align: center;
        }
        .target-zone.waiting {
            background: #cc2222;
        }
        .target-zone.ready {
            background: #22aa44;
        }
        .target-zone.result-zone {
            background: rgba(255,255,255,0.05);
        }
        .target-zone.too-early {
            background: #cc8800;
        }
        .zone-text {
            font-size: 1.8em;
            font-weight: bold;
        }
        .zone-sub {
            font-size: 1em;
            margin-top: 8px;
            opacity: 0.8;
        }
        .zone-time {
            font-size: 4em;
            font-weight: bold;
            color: #ff6b9d;
        }
        .zone-unit {
            font-size: 1.2em;
            color: #aaa;
        }
        .stats-panel {
            padding: 20px;
            background: rgba(255,255,255,0.03);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            text-align: center;
        }
        .stat-box {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 12px 8px;
        }
        .stat-label {
            font-size: 0.75em;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-value {
            font-size: 1.4em;
            font-weight: bold;
            color: #ff6b9d;
            margin-top: 4px;
        }
        .attempts {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .attempt-pill {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .attempt-pill.fast { background: rgba(68,255,136,0.2); color: #44ff88; }
        .attempt-pill.medium { background: rgba(255,170,68,0.2); color: #ffaa44; }
        .attempt-pill.slow { background: rgba(255,68,102,0.2); color: #ff4466; }
        .rating {
            text-align: center;
            margin-top: 12px;
            font-size: 1.1em;
        }
        .controls { margin-top: 12px; display: flex; gap: 10px; }
        button.action-btn {
            background: #ff6b9d; color: #1a0a2e; border: none; padding: 10px 24px;
            border-radius: 25px; font-size: 1em; font-weight: bold; cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        button.action-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,107,157,0.4); }
        .back-link { margin-top: 16px; }
        .back-link a { color: #ff6b9d; text-decoration: none; font-size: 0.95em; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>⚡ Reaction Time</h1>
    <div class="info">
        <div>Round: <span id="round">0</span>/5</div>
        <div>Best: <span id="best">-</span></div>
    </div>
    <div class="game-area">
        <div class="target-zone result-zone" id="zone" onclick="handleClick()">
            <div class="zone-text">⚡ Reaction Test</div>
            <div class="zone-sub">Click/tap to start<br>5 rounds — how fast are you?</div>
        </div>
        <div class="stats-panel">
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">Average</div>
                    <div class="stat-value" id="avg">—</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Best</div>
                    <div class="stat-value" id="bestTime">—</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">All-Time</div>
                    <div class="stat-value" id="allTime">—</div>
                </div>
            </div>
            <div class="attempts" id="attempts"></div>
            <div class="rating" id="rating"></div>
        </div>
    </div>
    <div class="controls">
        <button class="action-btn" onclick="resetGame()">🔄 Reset</button>
    </div>
    <div class="back-link"><a href="../index.html">← Back to Arcade</a></div>

    <script>
    const zone = document.getElementById('zone');
    let state = 'idle'; // idle, waiting, ready, result
    let timer = null;
    let startTime = 0;
    let times = [];
    let round = 0;
    const MAX_ROUNDS = 5;

    let allTimeBest = parseInt(localStorage.getItem('reaction_best') || '0');
    if (allTimeBest) document.getElementById('allTime').textContent = allTimeBest + 'ms';

    function handleClick() {
        if (state === 'idle') {
            startRound();
        } else if (state === 'waiting') {
            // Too early!
            clearTimeout(timer);
            zone.className = 'target-zone too-early';
            zone.innerHTML = `
                <div class="zone-text">⚠️ Too Early!</div>
                <div class="zone-sub">Click/tap to try again</div>
            `;
            state = 'idle';
        } else if (state === 'ready') {
            const reaction = Date.now() - startTime;
            times.push(reaction);
            round++;
            document.getElementById('round').textContent = round;
            showResult(reaction);
        } else if (state === 'result') {
            if (round < MAX_ROUNDS) {
                startRound();
            } else {
                showFinal();
            }
        } else if (state === 'final') {
            resetGame();
        }
    }

    function startRound() {
        state = 'waiting';
        zone.className = 'target-zone waiting';
        zone.innerHTML = `
            <div class="zone-text">🔴 Wait...</div>
            <div class="zone-sub">Wait for green, then click!</div>
        `;

        const delay = 1500 + Math.random() * 3500;
        timer = setTimeout(() => {
            state = 'ready';
            startTime = Date.now();
            zone.className = 'target-zone ready';
            zone.innerHTML = `
                <div class="zone-text">🟢 CLICK NOW!</div>
            `;
        }, delay);
    }

    function showResult(ms) {
        state = 'result';
        zone.className = 'target-zone result-zone';
        
        let rating = getRating(ms);
        zone.innerHTML = `
            <div class="zone-time">${ms}</div>
            <div class="zone-unit">milliseconds</div>
            <div class="zone-sub">${rating.text} — Click to continue</div>
        `;

        // Update stats
        const avg = Math.round(times.reduce((a, b) => a + b) / times.length);
        const best = Math.min(...times);
        document.getElementById('avg').textContent = avg + 'ms';
        document.getElementById('bestTime').textContent = best + 'ms';
        document.getElementById('best').textContent = best + 'ms';

        if (!allTimeBest || best < allTimeBest) {
            allTimeBest = best;
            localStorage.setItem('reaction_best', allTimeBest);
            document.getElementById('allTime').textContent = allTimeBest + 'ms';
        }

        renderAttempts();
    }

    function showFinal() {
        state = 'final';
        const avg = Math.round(times.reduce((a, b) => a + b) / times.length);
        const best = Math.min(...times);
        const rating = getRating(avg);

        zone.className = 'target-zone result-zone';
        zone.innerHTML = `
            <div class="zone-text">${rating.emoji} ${rating.label}</div>
            <div class="zone-time">${avg}</div>
            <div class="zone-unit">ms average</div>
            <div class="zone-sub">Best: ${best}ms — Click to play again</div>
        `;

        document.getElementById('rating').textContent = `${rating.emoji} ${rating.label} — Average: ${avg}ms`;
    }

    function getRating(ms) {
        if (ms < 180) return { emoji: '🏆', label: 'Superhuman', text: '🏆 Superhuman reflexes!' };
        if (ms < 220) return { emoji: '⚡', label: 'Lightning', text: '⚡ Lightning fast!' };
        if (ms < 270) return { emoji: '🔥', label: 'Fast', text: '🔥 Nice and quick!' };
        if (ms < 350) return { emoji: '👍', label: 'Average', text: '👍 Solid reaction!' };
        if (ms < 450) return { emoji: '🐢', label: 'Slow', text: '🐢 A bit sluggish...' };
        return { emoji: '😴', label: 'Sleepy', text: '😴 Wake up!' };
    }

    function renderAttempts() {
        document.getElementById('attempts').innerHTML = times.map((t, i) => {
            let cls = t < 250 ? 'fast' : t < 350 ? 'medium' : 'slow';
            return `<div class="attempt-pill ${cls}">#${i + 1}: ${t}ms</div>`;
        }).join('');
    }

    function resetGame() {
        clearTimeout(timer);
        times = [];
        round = 0;
        state = 'idle';
        document.getElementById('round').textContent = '0';
        document.getElementById('avg').textContent = '—';
        document.getElementById('bestTime').textContent = '—';
        document.getElementById('best').textContent = allTimeBest ? allTimeBest + 'ms' : '-';
        document.getElementById('attempts').innerHTML = '';
        document.getElementById('rating').textContent = '';
        zone.className = 'target-zone result-zone';
        zone.innerHTML = `
            <div class="zone-text">⚡ Reaction Test</div>
            <div class="zone-sub">Click/tap to start<br>5 rounds — how fast are you?</div>
        `;
    }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>084 - Gomoku</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(180deg, #1a0a2e 0%, #2d1650 50%, #1a0a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            color: white;
            -webkit-user-select: none;
            user-select: none;
        }
        h1 { color: #ff6b9d; font-size: 1.8em; margin-bottom: 8px; text-shadow: 0 0 20px rgba(255,107,157,0.5); }
        .info { display: flex; gap: 20px; margin-bottom: 12px; font-size: 1.1em; align-items: center; flex-wrap: wrap; justify-content: center; }
        .info span { color: #ff6b9d; }
        .status { font-size: 1.2em; margin-bottom: 10px; min-height: 1.5em; }
        .board-wrap {
            padding: 8px;
            background: rgba(255,107,157,0.08);
            border-radius: 14px;
            border: 2px solid rgba(255,107,157,0.2);
            overflow: auto;
        }
        canvas {
            display: block;
            cursor: pointer;
            border-radius: 8px;
        }
        .controls { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        button.action-btn {
            background: #ff6b9d; color: #1a0a2e; border: none; padding: 10px 24px;
            border-radius: 25px; font-size: 1em; font-weight: bold; cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        button.action-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,107,157,0.4); }
        .back-link { margin-top: 16px; }
        .back-link a { color: #ff6b9d; text-decoration: none; font-size: 0.95em; }
        .back-link a:hover { text-decoration: underline; }
        .win-line { animation: winPulse 0.6s ease-in-out infinite alternate; }
        @keyframes winPulse { from { opacity: 0.7; } to { opacity: 1; } }
    </style>
</head>
<body>
    <h1>⚫ Gomoku</h1>
    <div class="info">
        <div>⚫ Black: <span id="blackWins">0</span></div>
        <div>⚪ White: <span id="whiteWins">0</span></div>
    </div>
    <div class="status" id="status">⚫ Black's turn</div>
    <div class="board-wrap">
        <canvas id="board"></canvas>
    </div>
    <div class="controls">
        <button class="action-btn" onclick="undoMove()">↩️ Undo</button>
        <button class="action-btn" onclick="newGame()">🔄 New Game</button>
        <button class="action-btn" onclick="toggleAI()" id="aiBtn">🤖 vs AI</button>
    </div>
    <div class="back-link"><a href="../index.html">← Back to Arcade</a></div>

    <script>
    const SIZE = 15;
    const CELL = Math.min(Math.floor((Math.min(window.innerWidth, 500) - 40) / SIZE), 32);
    const PAD = Math.floor(CELL / 2) + 4;
    const W = CELL * (SIZE - 1) + PAD * 2;
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    canvas.width = W; canvas.height = W;

    let grid, history, turn, gameOver, aiMode, wins;

    function init() {
        wins = { black: 0, white: 0 };
        aiMode = false;
        newGame();
    }

    function newGame() {
        grid = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
        history = [];
        turn = 1; // 1=black, 2=white
        gameOver = false;
        updateStatus();
        draw();
    }

    function toggleAI() {
        aiMode = !aiMode;
        document.getElementById('aiBtn').textContent = aiMode ? '👥 vs Human' : '🤖 vs AI';
        newGame();
    }

    function draw() {
        // Board background
        ctx.fillStyle = '#dcb35c';
        ctx.fillRect(0, 0, W, W);

        // Grid lines
        ctx.strokeStyle = '#8b7332';
        ctx.lineWidth = 1;
        for (let i = 0; i < SIZE; i++) {
            const p = PAD + i * CELL;
            ctx.beginPath(); ctx.moveTo(PAD, p); ctx.lineTo(W - PAD, p); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(p, PAD); ctx.lineTo(p, W - PAD); ctx.stroke();
        }

        // Star points
        const stars = SIZE === 15 ? [[3,3],[3,11],[7,7],[11,3],[11,11],[3,7],[7,3],[7,11],[11,7]] : [];
        ctx.fillStyle = '#8b7332';
        for (const [r, c] of stars) {
            ctx.beginPath();
            ctx.arc(PAD + c * CELL, PAD + r * CELL, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        // Stones
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                if (grid[r][c] === 0) continue;
                const x = PAD + c * CELL, y = PAD + r * CELL;
                const radius = CELL * 0.42;
                
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.arc(x + 2, y + 2, radius, 0, Math.PI * 2);
                ctx.fill();

                // Stone
                const grad = ctx.createRadialGradient(x - radius*0.3, y - radius*0.3, radius*0.1, x, y, radius);
                if (grid[r][c] === 1) {
                    grad.addColorStop(0, '#555');
                    grad.addColorStop(1, '#111');
                } else {
                    grad.addColorStop(0, '#fff');
                    grad.addColorStop(1, '#ccc');
                }
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Last move marker
        if (history.length > 0) {
            const [lr, lc] = history[history.length - 1];
            const x = PAD + lc * CELL, y = PAD + lr * CELL;
            ctx.fillStyle = grid[lr][lc] === 1 ? '#ff6b9d' : '#ff6b9d';
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function drawWinLine(cells) {
        const x1 = PAD + cells[0][1] * CELL, y1 = PAD + cells[0][0] * CELL;
        const x2 = PAD + cells[4][1] * CELL, y2 = PAD + cells[4][0] * CELL;
        ctx.strokeStyle = '#ff6b9d';
        ctx.lineWidth = 3;
        ctx.setLineDash([]);
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    }

    function checkWin(r, c) {
        const p = grid[r][c];
        const dirs = [[0,1],[1,0],[1,1],[1,-1]];
        for (const [dr, dc] of dirs) {
            let cells = [[r, c]];
            for (let d = -1; d <= 1; d += 2) {
                for (let i = 1; i < 5; i++) {
                    const nr = r + dr * i * d, nc = c + dc * i * d;
                    if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE || grid[nr][nc] !== p) break;
                    cells.push([nr, nc]);
                }
            }
            if (cells.length >= 5) {
                cells.sort((a, b) => a[0] - b[0] || a[1] - b[1]);
                return cells.slice(0, 5);
            }
        }
        return null;
    }

    function placeStone(r, c) {
        if (gameOver || grid[r][c] !== 0) return false;
        grid[r][c] = turn;
        history.push([r, c]);
        const winCells = checkWin(r, c);
        if (winCells) {
            gameOver = true;
            if (turn === 1) wins.black++; else wins.white++;
            document.getElementById('blackWins').textContent = wins.black;
            document.getElementById('whiteWins').textContent = wins.white;
            draw();
            drawWinLine(winCells);
            document.getElementById('status').textContent = turn === 1 ? '⚫ Black wins! 🎉' : '⚪ White wins! 🎉';
            return true;
        }
        if (history.length === SIZE * SIZE) {
            gameOver = true;
            draw();
            document.getElementById('status').textContent = '🤝 Draw!';
            return true;
        }
        turn = turn === 1 ? 2 : 1;
        draw();
        updateStatus();
        return true;
    }

    function updateStatus() {
        document.getElementById('status').textContent = turn === 1 ? "⚫ Black's turn" : "⚪ White's turn";
    }

    canvas.addEventListener('click', (e) => {
        if (gameOver) return;
        if (aiMode && turn === 2) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        const c = Math.round((x - PAD) / CELL);
        const r = Math.round((y - PAD) / CELL);
        if (r < 0 || r >= SIZE || c < 0 || c >= SIZE) return;
        if (placeStone(r, c) && aiMode && !gameOver) {
            setTimeout(aiMove, 200);
        }
    });

    function undoMove() {
        if (history.length === 0) return;
        const steps = aiMode ? 2 : 1;
        for (let i = 0; i < steps && history.length > 0; i++) {
            const [r, c] = history.pop();
            grid[r][c] = 0;
        }
        turn = 1 + (history.length % 2 === 0 ? 0 : 1);
        gameOver = false;
        draw();
        updateStatus();
    }

    // Simple AI: score-based heuristic
    function aiMove() {
        if (gameOver) return;
        let bestScore = -1, bestR = -1, bestC = -1;
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                if (grid[r][c] !== 0) continue;
                if (!hasNeighbor(r, c, 2)) continue;
                const score = evalPos(r, c, 2) * 1.1 + evalPos(r, c, 1);
                if (score > bestScore) { bestScore = score; bestR = r; bestC = c; }
            }
        }
        if (bestR === -1) {
            // First move near center
            bestR = 7; bestC = 7;
            if (grid[7][7] !== 0) { bestR = 7; bestC = 8; }
        }
        placeStone(bestR, bestC);
    }

    function hasNeighbor(r, c, dist) {
        for (let dr = -dist; dr <= dist; dr++) {
            for (let dc = -dist; dc <= dist; dc++) {
                const nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && grid[nr][nc] !== 0) return true;
            }
        }
        return false;
    }

    function evalPos(r, c, player) {
        let score = 0;
        const dirs = [[0,1],[1,0],[1,1],[1,-1]];
        for (const [dr, dc] of dirs) {
            let count = 1, open = 0;
            for (let d = -1; d <= 1; d += 2) {
                let blocked = false;
                for (let i = 1; i <= 4; i++) {
                    const nr = r + dr*i*d, nc = c + dc*i*d;
                    if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) { blocked = true; break; }
                    if (grid[nr][nc] === player) count++;
                    else if (grid[nr][nc] === 0) { open++; break; }
                    else { blocked = true; break; }
                }
                if (!blocked && open === 0) open++;
            }
            if (count >= 5) score += 100000;
            else if (count === 4 && open >= 2) score += 10000;
            else if (count === 4 && open === 1) score += 5000;
            else if (count === 3 && open >= 2) score += 1000;
            else if (count === 3 && open === 1) score += 100;
            else if (count === 2 && open >= 2) score += 50;
            else if (count === 2 && open === 1) score += 10;
        }
        return score;
    }

    init();
    </script>
</body>
</html>

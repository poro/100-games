<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 100 Games Arcade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(0,0,0,0.3);
            border-bottom: 3px solid #e94560;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #e94560, 0 0 40px #e94560;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 20px #e94560, 0 0 40px #e94560; }
            to { text-shadow: 0 0 30px #ff6b6b, 0 0 60px #ff6b6b, 0 0 80px #ff6b6b; }
        }
        
        .subtitle {
            color: #a0a0a0;
            font-size: 1.2rem;
        }
        
        .progress-bar {
            max-width: 400px;
            margin: 20px auto;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            overflow: hidden;
            height: 30px;
            position: relative;
        }
        
        .progress-fill {
            width: 45%;
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            transition: width 0.5s ease;
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .game-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 25px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .game-card:hover {
            transform: translateY(-5px);
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
            box-shadow: 0 10px 40px rgba(233, 69, 96, 0.3);
        }
        
        .game-number {
            font-size: 0.8rem;
            color: #e94560;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .game-title {
            font-size: 1.3rem;
            margin-bottom: 10px;
        }
        
        .game-emoji {
            font-size: 2.5rem;
            margin-bottom: 15px;
            display: block;
        }
        
        .play-badge {
            background: rgba(233, 69, 96, 0.4);
            color: #ff9eae;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            margin-left: 8px;
        }
        
        .high-score-badge {
            display: block;
            margin-top: 8px;
            font-size: 0.8rem;
            color: #ffd700;
        }
        
        .game-category {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #a0a0a0;
        }
        
        .category-filter {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 20px;
        }
        
        .filter-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: #e94560;
        }
        
        /* Stats Dashboard */
        .stats-section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
        }
        
        .stats-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .stats-header h2 {
            font-size: 1.5rem;
            color: #e94560;
        }
        
        .stats-toggle {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #aaa;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        
        .stats-toggle:hover {
            background: rgba(233, 69, 96, 0.3);
            color: #fff;
        }
        
        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #e94560;
            display: block;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }
        
        .stats-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .stats-list-section h3 {
            font-size: 1.1rem;
            color: #ccc;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .stats-list {
            list-style: none;
        }
        
        .stats-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 4px;
            transition: background 0.2s;
        }
        
        .stats-list li:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .stats-list .game-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .stats-list .game-info .rank {
            color: #e94560;
            font-weight: bold;
            font-size: 0.85rem;
            width: 20px;
        }
        
        .stats-list .game-info .rank:first-child { color: #ffd700; }
        
        .stats-list .game-meta {
            color: #888;
            font-size: 0.85rem;
            text-align: right;
        }
        
        .stats-list .game-meta .play-count {
            color: #e94560;
            font-weight: 600;
        }
        
        .stats-empty {
            color: #555;
            text-align: center;
            padding: 30px;
            font-style: italic;
        }
        
        .stats-hidden { display: none; }
        
        @media (max-width: 700px) {
            .stats-columns { grid-template-columns: 1fr; }
            .stats-section { padding: 0 20px; }
        }
        
        footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 0.9rem;
        }
        
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .games-grid { padding: 20px; gap: 15px; }
            .game-card { padding: 20px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>🎮 100 Games Arcade</h1>
        <p class="subtitle">Browser games, pure JavaScript, zero dependencies</p>
        <div class="progress-bar">
            <div class="progress-fill" style="width: 45%;">45 / 100</div>
        </div>
    </header>
    
    <div class="category-filter">
        <a href="tutorials/" class="filter-btn" style="background: #4ecdc4; color: #1a1a2e;">📚 Tutorials</a>
        <button class="filter-btn active" data-category="all">All Games</button>
        <button class="filter-btn" data-category="clicker">🖱️ Clicker</button>
        <button class="filter-btn" data-category="reflex">⚡ Reflex</button>
        <button class="filter-btn" data-category="puzzle">🧩 Puzzle</button>
        <button class="filter-btn" data-category="arcade">👾 Arcade</button>
        <button class="filter-btn" data-category="physics">🎱 Physics</button>
        <button class="filter-btn" data-category="shooter">🔫 Shooter</button>
    </div>
    
    <div class="games-grid" id="gamesGrid">
        <!-- Games populated by JS -->
    </div>
    
    <div class="stats-section" id="statsSection">
        <div class="stats-header">
            <h2>📊 Your Stats</h2>
            <button class="stats-toggle" id="statsToggle" onclick="toggleStats()">Hide</button>
        </div>
        <div id="statsContent">
            <div class="stats-summary" id="statsSummary"></div>
            <div class="stats-columns">
                <div class="stats-list-section">
                    <h3>🏆 Most Played</h3>
                    <ul class="stats-list" id="mostPlayed"></ul>
                </div>
                <div class="stats-list-section">
                    <h3>🕐 Recently Played</h3>
                    <ul class="stats-list" id="recentlyPlayed"></ul>
                </div>
            </div>
        </div>
    </div>

    <footer>
        Made with ❤️ and Claude • <span id="gameCount">45</span> games and counting!
    </footer>

    <script src="analytics.js"></script>
    <script>
        const games = [
            { num: "001", name: "Click Counter", emoji: "👆", category: "clicker", folder: "001-click-counter" },
            { num: "002", name: "Whack-a-Mole", emoji: "🐹", category: "reflex", folder: "002-whack-a-mole" },
            { num: "003", name: "Balloon Pop", emoji: "🎈", category: "clicker", folder: "003-balloon-pop" },
            { num: "004", name: "Color Match", emoji: "🎨", category: "puzzle", folder: "004-color-match" },
            { num: "005", name: "Speed Clicker", emoji: "⏱️", category: "clicker", folder: "005-speed-clicker" },
            { num: "006", name: "Target Practice", emoji: "🎯", category: "shooter", folder: "006-target-practice" },
            { num: "007", name: "Simon Says", emoji: "🔴", category: "puzzle", folder: "007-simon-says" },
            { num: "008", name: "Maze Walker", emoji: "🌀", category: "puzzle", folder: "008-maze-walker" },
            { num: "009", name: "Coin Collector", emoji: "🪙", category: "arcade", folder: "009-coin-collector" },
            { num: "010", name: "Dodge the Blocks", emoji: "🟥", category: "arcade", folder: "010-dodge-the-blocks" },
            { num: "011", name: "Snake Classic", emoji: "🐍", category: "arcade", folder: "011-snake-classic" },
            { num: "012", name: "Pac-Man Lite", emoji: "😮", category: "arcade", folder: "012-pacman-lite" },
            { num: "013", name: "Ice Sliding Puzzle", emoji: "🧊", category: "puzzle", folder: "013-ice-sliding-puzzle" },
            { num: "014", name: "Tank Patrol", emoji: "🪖", category: "shooter", folder: "014-tank-patrol" },
            { num: "015", name: "Pong", emoji: "🏓", category: "arcade", folder: "015-pong" },
            { num: "016", name: "Breakout", emoji: "🧱", category: "arcade", folder: "016-breakout" },
            { num: "017", name: "Bouncing Balls", emoji: "⚽", category: "physics", folder: "017-bouncing-balls" },
            { num: "018", name: "Air Hockey", emoji: "🏒", category: "physics", folder: "018-air-hockey" },
            { num: "019", name: "Pinball Simple", emoji: "🎰", category: "physics", folder: "019-pinball-simple" },
            { num: "020", name: "Pool Billiards", emoji: "🎱", category: "physics", folder: "020-pool-billiards" },
            { num: "021", name: "Gravity Golf", emoji: "⛳", category: "physics", folder: "021-gravity-golf" },
            { num: "022", name: "Space Invaders", emoji: "👾", category: "shooter", folder: "022-space-invaders" },
            { num: "023", name: "Galaga Clone", emoji: "🚀", category: "shooter", folder: "023-galaga-clone" },
            { num: "024", name: "Asteroid Shooter", emoji: "☄️", category: "shooter", folder: "024-asteroid-shooter" },
            { num: "025", name: "Tower Defense Lite", emoji: "🏰", category: "shooter", folder: "025-tower-defense-lite" },
            { num: "026", name: "Duck Hunt", emoji: "🦆", category: "shooter", folder: "026-duck-hunt" },
            { num: "027", name: "Zombie Wave", emoji: "🧟", category: "shooter", folder: "027-zombie-wave" },
            { num: "028", name: "Flappy Bird", emoji: "🐦", category: "arcade", folder: "028-flappy-bird" },
            { num: "029", name: "Tetris", emoji: "🧱", category: "puzzle", folder: "029-tetris" },
            { num: "030", name: "Memory Match", emoji: "🧠", category: "puzzle", folder: "030-memory-match" },
            { num: "031", name: "2048", emoji: "🔢", category: "puzzle", folder: "031-2048" },
            { num: "032", name: "Minesweeper", emoji: "💣", category: "puzzle", folder: "032-minesweeper" },
            { num: "033", name: "Solitaire", emoji: "🃏", category: "board", folder: "033-solitaire" },
            { num: "034", name: "Fruit Ninja", emoji: "🍉", category: "arcade", folder: "034-fruit-ninja" },
            { num: "035", name: "Geometry Dash", emoji: "▲", category: "arcade", folder: "035-geometry-dash" },
            { num: "036", name: "Crossy Road", emoji: "🐔", category: "arcade", folder: "036-crossy-road" },
            { num: "037", name: "Brick Buster", emoji: "🧱", category: "physics", folder: "037-brick-buster" },
            { num: "038", name: "Word Scramble", emoji: "🔤", category: "word", folder: "038-word-scramble" },
            { num: "039", name: "Bubble Shooter", emoji: "🫧", category: "puzzle", folder: "039-bubble-shooter" },
            { num: "060", name: "Wordle", emoji: "📖", category: "word", folder: "060-wordle" },
            { num: "061", name: "Hangman", emoji: "🪢", category: "word", folder: "061-hangman" },
            { num: "062", name: "Color Flood", emoji: "🌊", category: "puzzle", folder: "062-color-flood" },
            { num: "063", name: "Rock Paper Scissors", emoji: "✊", category: "arcade", folder: "063-rock-paper-scissors" },
            { num: "064", name: "Guess the Number", emoji: "🔮", category: "puzzle", folder: "064-guess-the-number" },
            { num: "065", name: "Connect Four", emoji: "🔴", category: "board", folder: "065-connect-four" },
        ];

        // Build a lookup for game metadata
        const gameLookup = {};
        games.forEach(g => { gameLookup[g.folder] = g; });

        let currentFilter = 'all';
        let currentSearch = '';

        function renderGames() {
            const grid = document.getElementById('gamesGrid');
            let filtered = currentFilter === 'all' ? games : games.filter(g => g.category === currentFilter);
            if (currentSearch) {
                const q = currentSearch.toLowerCase();
                filtered = filtered.filter(g => g.name.toLowerCase().includes(q) || g.category.toLowerCase().includes(q));
            }

            const stats = GameAnalytics.getStats();
            
            grid.innerHTML = filtered.map(game => {
                const gs = stats[game.folder];
                const playBadge = gs && gs.plays > 0
                    ? `<span class="play-badge" title="${gs.plays} plays, high score: ${gs.highScore || 0}">${gs.plays}×</span>`
                    : '';
                const highBadge = gs && gs.highScore > 0
                    ? `<span class="high-score-badge" title="High score">🏅 ${gs.highScore}</span>`
                    : '';
                return `
                <a href="${game.folder}/index.html" class="game-card" data-category="${game.category}" data-folder="${game.folder}">
                    <span class="game-number">GAME ${game.num} ${playBadge}</span>
                    <span class="game-emoji">${game.emoji}</span>
                    <h3 class="game-title">${game.name}</h3>
                    <span class="game-category">${game.category}</span>
                    ${highBadge}
                </a>
            `}).join('');

            // Track clicks
            grid.querySelectorAll('.game-card').forEach(card => {
                card.addEventListener('click', () => {
                    const folder = card.dataset.folder;
                    if (folder) GameAnalytics.trackPlay(folder);
                });
            });
            
            document.getElementById('gameCount').textContent = games.length;
        }

        // Stats Dashboard
        function renderStats() {
            const summary = GameAnalytics.getSummary();
            const leaderboard = GameAnalytics.getLeaderboard(5);
            const recent = GameAnalytics.getRecent(5);

            // Summary cards
            const summaryEl = document.getElementById('statsSummary');
            if (summary.totalPlays === 0) {
                document.getElementById('statsSection').style.display = 'none';
                return;
            }
            document.getElementById('statsSection').style.display = 'block';

            const completionRate = summary.gamesPlayed > 0
                ? Math.round((summary.gamesPlayed / games.length) * 100)
                : 0;

            summaryEl.innerHTML = `
                <div class="stat-card">
                    <span class="stat-value">${summary.totalPlays}</span>
                    <span class="stat-label">Total Plays</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value">${summary.gamesPlayed}</span>
                    <span class="stat-label">Games Tried</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value">${GameAnalytics.formatTime(summary.totalTime)}</span>
                    <span class="stat-label">Time Played</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value">${completionRate}%</span>
                    <span class="stat-label">Catalog Explored</span>
                </div>
            `;

            // Most played
            const mpEl = document.getElementById('mostPlayed');
            if (leaderboard.length === 0) {
                mpEl.innerHTML = '<li class="stats-empty">Play some games to see your stats!</li>';
            } else {
                mpEl.innerHTML = leaderboard.map((g, i) => {
                    const meta = gameLookup[g.id] || { emoji: '🎮', name: g.id };
                    const medals = ['🥇', '🥈', '🥉'];
                    const rank = i < 3 ? medals[i] : `${i + 1}.`;
                    return `<li>
                        <span class="game-info">
                            <span class="rank">${rank}</span>
                            <span>${meta.emoji} ${meta.name}</span>
                        </span>
                        <span class="game-meta">
                            <span class="play-count">${g.plays}×</span>
                            ${g.highScore > 0 ? ` · 🏅${g.highScore}` : ''}
                            ${g.totalTime > 0 ? ` · ${GameAnalytics.formatTime(g.totalTime)}` : ''}
                        </span>
                    </li>`;
                }).join('');
            }

            // Recently played
            const rpEl = document.getElementById('recentlyPlayed');
            if (recent.length === 0) {
                rpEl.innerHTML = '<li class="stats-empty">No games played yet</li>';
            } else {
                rpEl.innerHTML = recent.map(g => {
                    const meta = gameLookup[g.id] || { emoji: '🎮', name: g.id };
                    return `<li>
                        <span class="game-info">
                            <span>${meta.emoji} ${meta.name}</span>
                        </span>
                        <span class="game-meta">${GameAnalytics.formatRelative(g.lastPlayed)}</span>
                    </li>`;
                }).join('');
            }
        }

        function toggleStats() {
            const content = document.getElementById('statsContent');
            const btn = document.getElementById('statsToggle');
            const hidden = content.classList.toggle('stats-hidden');
            btn.textContent = hidden ? 'Show' : 'Hide';
            localStorage.setItem('100games_stats_hidden', hidden);
        }

        // Restore stats visibility preference
        if (localStorage.getItem('100games_stats_hidden') === 'true') {
            document.getElementById('statsContent').classList.add('stats-hidden');
            document.getElementById('statsToggle').textContent = 'Show';
        }

        document.querySelectorAll('.filter-btn[data-category]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.category;
                renderGames();
            });
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearch = e.target.value;
            renderGames();
        });

        renderGames();
        renderStats();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>063 - Rock Paper Scissors</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .choices button {
            font-size: 2rem;
            margin: 0 10px;
            cursor: pointer;
            border: none;
            background: none;
        }
        .result {
            margin-top: 20px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rock, Paper, Scissors</h1>
        <div class="choices">
            <button onclick="play('rock')">✊</button>
            <button onclick="play('paper')">✋</button>
            <button onclick="play('scissors')">✌️</button>
        </div>
        <div class="result">
            <p id="result-text">Choose your weapon!</p>
            <p>You: <span id="player-choice"></span> | Computer: <span id="computer-choice"></span></p>
            <p>Score: <span id="score">0</span></p>
        </div>
    </div>

    <script>
        let score = 0;

        function play(playerChoice) {
            const choices = ['rock', 'paper', 'scissors'];
            const computerChoice = choices[Math.floor(Math.random() * choices.length)];
            let resultText = '';

            if (playerChoice === computerChoice) {
                resultText = "It's a tie!";
            } else if (
                (playerChoice === 'rock' && computerChoice === 'scissors') ||
                (playerChoice === 'paper' && computerChoice === 'rock') ||
                (playerChoice === 'scissors' && computerChoice === 'paper')
            ) {
                resultText = 'You win!';
                score++;
            } else {
                resultText = 'You lose!';
                score--;
            }

            document.getElementById('result-text').innerText = resultText;
            document.getElementById('player-choice').innerText = playerChoice;
            document.getElementById('computer-choice').innerText = computerChoice;
            document.getElementById('score').innerText = score;
        }
    </script>
</body>
</html>

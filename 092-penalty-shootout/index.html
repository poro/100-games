<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>092 - Penalty Shootout</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(180deg, #1a0a2e 0%, #2d1650 50%, #1a0a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            color: white;
            -webkit-user-select: none;
            user-select: none;
        }
        h1 { color: #ff6b9d; font-size: 1.8em; margin-bottom: 8px; text-shadow: 0 0 20px rgba(255,107,157,0.5); }
        .info { display: flex; gap: 20px; margin-bottom: 12px; font-size: 1.1em; align-items: center; }
        .info span { color: #ff6b9d; }
        canvas {
            border-radius: 16px;
            border: 2px solid rgba(255,107,157,0.2);
            cursor: crosshair;
        }
        .scoreboard {
            width: min(440px, 95vw);
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
        }
        .team {
            text-align: center;
        }
        .team-name { font-size: 0.85em; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .team-score { font-size: 2.5em; font-weight: bold; color: #ff6b9d; }
        .round-dots {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            justify-content: center;
        }
        .dot {
            width: 14px; height: 14px; border-radius: 50%;
            background: rgba(255,255,255,0.15);
        }
        .dot.goal { background: #2ecc71; }
        .dot.miss { background: #e74c3c; }
        .dot.save { background: #f39c12; }
        .vs { display: flex; align-items: center; font-size: 1.3em; color: #555; }
        .controls { margin-top: 12px; display: flex; gap: 10px; }
        button.action-btn {
            background: #ff6b9d; color: #1a0a2e; border: none; padding: 10px 24px;
            border-radius: 25px; font-size: 1em; font-weight: bold; cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        button.action-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,107,157,0.4); }
        .message {
            margin-top: 8px;
            font-size: 1.2em;
            min-height: 30px;
            color: #ccc;
        }
        .back-link { margin-top: 16px; }
        .back-link a { color: #ff6b9d; text-decoration: none; font-size: 0.95em; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>⚽ Penalty Shootout</h1>
    <div class="info">
        <div>Round: <span id="round">1</span>/5</div>
        <div>Wins: <span id="wins">0</span></div>
    </div>
    <canvas id="game" width="440" height="340"></canvas>
    <div class="message" id="message">Click/tap where you want to shoot!</div>
    <div class="scoreboard">
        <div class="team">
            <div class="team-name">You</div>
            <div class="team-score" id="playerScore">0</div>
            <div class="round-dots" id="playerDots"></div>
        </div>
        <div class="vs">VS</div>
        <div class="team">
            <div class="team-name">CPU</div>
            <div class="team-score" id="cpuScore">0</div>
            <div class="round-dots" id="cpuDots"></div>
        </div>
    </div>
    <div class="controls">
        <button class="action-btn" onclick="newMatch()">🔄 New Match</button>
    </div>
    <div class="back-link"><a href="../index.html">← Back to Arcade</a></div>

    <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    // Goal dimensions (perspective)
    const GOAL = { x: 70, y: 40, w: 300, h: 160 };
    const NET_BOTTOM = GOAL.y + GOAL.h;

    let state = 'shoot'; // shoot, animating, save, result
    let round = 0, playerGoals = 0, cpuGoals = 0;
    let playerResults = [], cpuResults = [];
    let ballX, ballY, targetX, targetY, keeperX, keeperDir;
    let animProgress = 0;
    let wins = parseInt(localStorage.getItem('penalty_wins') || '0');
    document.getElementById('wins').textContent = wins;

    function drawField() {
        // Sky
        const sky = ctx.createLinearGradient(0, 0, 0, H);
        sky.addColorStop(0, '#1a6b3a');
        sky.addColorStop(1, '#0d4a25');
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, W, H);

        // Grass
        ctx.fillStyle = '#2d8a4e';
        ctx.fillRect(0, H * 0.65, W, H * 0.35);
        // Grass stripes
        for (let i = 0; i < 6; i++) {
            ctx.fillStyle = i % 2 === 0 ? '#2d8a4e' : '#34975a';
            ctx.fillRect(0, H * 0.65 + i * (H * 0.35 / 6), W, H * 0.35 / 6);
        }

        // Goal posts
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 6;
        ctx.strokeRect(GOAL.x, GOAL.y, GOAL.w, GOAL.h);

        // Crossbar shadow
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(GOAL.x, GOAL.y + 5);
        ctx.lineTo(GOAL.x + GOAL.w, GOAL.y + 5);
        ctx.stroke();

        // Net
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 1;
        for (let x = GOAL.x; x <= GOAL.x + GOAL.w; x += 15) {
            ctx.beginPath();
            ctx.moveTo(x, GOAL.y);
            ctx.lineTo(x, NET_BOTTOM);
            ctx.stroke();
        }
        for (let y = GOAL.y; y <= NET_BOTTOM; y += 15) {
            ctx.beginPath();
            ctx.moveTo(GOAL.x, y);
            ctx.lineTo(GOAL.x + GOAL.w, y);
            ctx.stroke();
        }

        // Penalty spot
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(W / 2, H - 40, 4, 0, Math.PI * 2);
        ctx.fill();
    }

    function drawKeeper(x, diving) {
        const ky = NET_BOTTOM - 50;
        const kx = GOAL.x + GOAL.w / 2 + x;
        
        ctx.fillStyle = '#f1c40f'; // jersey
        if (diving) {
            // Diving pose
            ctx.save();
            ctx.translate(kx, ky);
            ctx.rotate(x > 0 ? 0.4 : -0.4);
            // Body
            ctx.fillStyle = '#f1c40f';
            ctx.fillRect(-8, -30, 16, 35);
            // Head
            ctx.fillStyle = '#deb887';
            ctx.beginPath();
            ctx.arc(0, -38, 10, 0, Math.PI * 2);
            ctx.fill();
            // Arms stretched
            ctx.fillStyle = '#f1c40f';
            ctx.fillRect(-30, -25, 60, 8);
            // Gloves
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(-33, -27, 8, 12);
            ctx.fillRect(25, -27, 8, 12);
            // Shorts
            ctx.fillStyle = '#222';
            ctx.fillRect(-8, 5, 16, 12);
            ctx.restore();
        } else {
            // Standing
            ctx.fillStyle = '#deb887';
            ctx.beginPath();
            ctx.arc(kx, ky - 38, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#f1c40f';
            ctx.fillRect(kx - 10, ky - 28, 20, 30);
            ctx.fillStyle = '#222';
            ctx.fillRect(kx - 10, ky + 2, 20, 14);
            // Arms
            ctx.fillStyle = '#f1c40f';
            ctx.fillRect(kx - 22, ky - 22, 12, 8);
            ctx.fillRect(kx + 10, ky - 22, 12, 8);
            // Gloves
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(kx - 25, ky - 24, 8, 12);
            ctx.fillRect(kx + 17, ky - 24, 8, 12);
        }
    }

    function drawBall(x, y, size) {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1;
        ctx.stroke();
        // Pentagon pattern
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(x - 2, y - 2, size * 0.35, 0, Math.PI * 2);
        ctx.fill();
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);
        drawField();

        if (state === 'shoot') {
            drawKeeper(0, false);
            drawBall(W / 2, H - 40, 12);
        } else if (state === 'animating') {
            const t = animProgress;
            const bx = W / 2 + (targetX - W / 2) * t;
            const by = (H - 40) + (targetY - (H - 40)) * t;
            const size = 12 - t * 5; // ball shrinks with distance
            
            drawKeeper(keeperX * t * 120, t > 0.3);
            drawBall(bx, by, Math.max(size, 5));
        } else if (state === 'save') {
            // CPU shooting at us - show where to dive
            drawKeeper(keeperDir * 120, true);
            const bx = W / 2 + (targetX - W / 2);
            const by = targetY;
            drawBall(bx, by, 7);
        }
    }

    function shoot(clickX, clickY) {
        if (state !== 'shoot') return;
        
        // Map click to goal area
        targetX = Math.max(GOAL.x + 20, Math.min(GOAL.x + GOAL.w - 20, clickX));
        targetY = Math.max(GOAL.y + 15, Math.min(NET_BOTTOM - 15, clickY));
        
        // Keeper dives randomly (slight bias toward center)
        keeperX = Math.random() < 0.5 ? -1 : 1;
        
        state = 'animating';
        animProgress = 0;
        animateShot();
    }

    function animateShot() {
        animProgress += 0.04;
        draw();
        
        if (animProgress >= 1) {
            // Check if keeper saved it
            const shotSide = targetX < GOAL.x + GOAL.w / 2 ? -1 : 1;
            const saved = shotSide === keeperX && Math.random() < 0.45;
            const offTarget = targetX < GOAL.x + 10 || targetX > GOAL.x + GOAL.w - 10 ||
                             targetY < GOAL.y + 5;
            
            if (offTarget && Math.random() < 0.3) {
                // Miss!
                playerResults.push('miss');
                showMessage('❌ Off target!');
            } else if (saved) {
                playerResults.push('save');
                showMessage('🧤 Saved!');
            } else {
                playerGoals++;
                playerResults.push('goal');
                showMessage('⚽ GOAL! 🎉');
            }
            
            updateScoreboard();
            
            // CPU turn after delay
            setTimeout(cpuShoot, 1500);
            return;
        }
        requestAnimationFrame(animateShot);
    }

    function cpuShoot() {
        showMessage('🤖 CPU is shooting... Click left or right to dive!');
        state = 'save';
        
        // CPU picks a target
        const side = Math.random() < 0.5 ? -1 : 1;
        targetX = GOAL.x + GOAL.w / 2 + side * (40 + Math.random() * 80);
        targetY = GOAL.y + 30 + Math.random() * 100;
        keeperDir = 0;
        draw();
    }

    function playerDive(dir) {
        if (state !== 'save') return;
        
        keeperDir = dir;
        const shotSide = targetX < GOAL.x + GOAL.w / 2 ? -1 : 1;
        const saved = shotSide === dir && Math.random() < 0.5;
        const cpuMiss = Math.random() < 0.15;
        
        state = 'result';
        
        // Animate keeper dive
        let t = 0;
        function diveAnim() {
            t += 0.08;
            ctx.clearRect(0, 0, W, H);
            drawField();
            drawKeeper(dir * Math.min(t, 1) * 120, t > 0.2);
            
            if (t < 0.5) {
                drawBall(W / 2, H - 40 + (targetY - H + 40) * t * 2, 12 - t * 10);
            } else {
                drawBall(targetX, targetY, 7);
            }
            
            if (t < 1) {
                requestAnimationFrame(diveAnim);
            } else {
                if (cpuMiss) {
                    cpuResults.push('miss');
                    showMessage('🎉 CPU missed!');
                } else if (saved) {
                    cpuResults.push('save');
                    showMessage('🧤 Great save!');
                } else {
                    cpuGoals++;
                    cpuResults.push('goal');
                    showMessage('😬 CPU scores...');
                }
                updateScoreboard();
                
                round++;
                if (round >= 5) {
                    setTimeout(endMatch, 1500);
                } else {
                    document.getElementById('round').textContent = round + 1;
                    setTimeout(() => {
                        state = 'shoot';
                        showMessage('Click/tap where you want to shoot!');
                        draw();
                    }, 1500);
                }
            }
        }
        diveAnim();
    }

    function endMatch() {
        let result;
        if (playerGoals > cpuGoals) {
            result = '🏆 You Win!';
            wins++;
            localStorage.setItem('penalty_wins', wins);
            document.getElementById('wins').textContent = wins;
        } else if (cpuGoals > playerGoals) {
            result = '😢 You Lose!';
        } else {
            result = '🤝 Draw!';
        }
        showMessage(`${result}  (${playerGoals}-${cpuGoals})  Click New Match to play again`);
        state = 'done';
    }

    function showMessage(msg) {
        document.getElementById('message').innerHTML = msg;
    }

    function updateScoreboard() {
        document.getElementById('playerScore').textContent = playerGoals;
        document.getElementById('cpuScore').textContent = cpuGoals;
        
        const pDots = document.getElementById('playerDots');
        const cDots = document.getElementById('cpuDots');
        pDots.innerHTML = playerResults.map(r => `<div class="dot ${r}"></div>`).join('') +
            Array(5 - playerResults.length).fill('<div class="dot"></div>').join('');
        cDots.innerHTML = cpuResults.map(r => `<div class="dot ${r}"></div>`).join('') +
            Array(5 - cpuResults.length).fill('<div class="dot"></div>').join('');
    }

    function newMatch() {
        round = 0;
        playerGoals = 0;
        cpuGoals = 0;
        playerResults = [];
        cpuResults = [];
        state = 'shoot';
        document.getElementById('round').textContent = '1';
        showMessage('Click/tap where you want to shoot!');
        updateScoreboard();
        draw();
    }

    // Input
    canvas.addEventListener('click', e => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = W / rect.width;
        const scaleY = H / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;
        
        if (state === 'shoot') {
            shoot(x, y);
        } else if (state === 'save') {
            playerDive(x < W / 2 ? -1 : 1);
        } else if (state === 'done') {
            newMatch();
        }
    });

    document.addEventListener('keydown', e => {
        if (state === 'save') {
            if (e.key === 'ArrowLeft') playerDive(-1);
            else if (e.key === 'ArrowRight') playerDive(1);
        }
    });

    // Init
    updateScoreboard();
    draw();
    </script>
</body>
</html>

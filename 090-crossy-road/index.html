<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>090 - Crossy Road</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(180deg, #1a0a2e 0%, #2d1650 50%, #1a0a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            color: white;
            -webkit-user-select: none;
            user-select: none;
        }
        h1 { color: #ff6b9d; font-size: 1.8em; margin-bottom: 8px; text-shadow: 0 0 20px rgba(255,107,157,0.5); }
        .info { display: flex; gap: 20px; margin-bottom: 12px; font-size: 1.1em; align-items: center; }
        .info span { color: #ff6b9d; }
        canvas {
            border-radius: 16px;
            border: 2px solid rgba(255,107,157,0.2);
            touch-action: none;
        }
        .controls { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        button.action-btn {
            background: #ff6b9d; color: #1a0a2e; border: none; padding: 10px 24px;
            border-radius: 25px; font-size: 1em; font-weight: bold; cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        button.action-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,107,157,0.4); }
        .mobile-controls {
            display: flex; gap: 8px; margin-top: 10px;
        }
        .dir-btn {
            width: 60px; height: 60px; border-radius: 50%; border: 2px solid rgba(255,107,157,0.4);
            background: rgba(255,107,157,0.15); color: white; font-size: 1.5em;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .dir-btn:active { background: rgba(255,107,157,0.4); }
        .back-link { margin-top: 16px; }
        .back-link a { color: #ff6b9d; text-decoration: none; font-size: 0.95em; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>🐔 Crossy Road</h1>
    <div class="info">
        <div>Score: <span id="score">0</span></div>
        <div>Best: <span id="best">0</span></div>
    </div>
    <canvas id="game" width="400" height="500"></canvas>
    <div class="mobile-controls">
        <button class="dir-btn" onclick="move(-1,0)">⬅️</button>
        <button class="dir-btn" onclick="move(0,-1)">⬆️</button>
        <button class="dir-btn" onclick="move(0,1)">⬇️</button>
        <button class="dir-btn" onclick="move(1,0)">➡️</button>
    </div>
    <div class="controls">
        <button class="action-btn" onclick="startGame()">🔄 New Game</button>
    </div>
    <div class="back-link"><a href="../index.html">← Back to Arcade</a></div>

    <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const COLS = 10, ROWS = 12;
    const CW = W / COLS, CH = H / ROWS;

    let player, lanes, score, bestScore, gameOver, cameraY;
    bestScore = parseInt(localStorage.getItem('crossy_best') || '0');
    document.getElementById('best').textContent = bestScore;

    const LANE_TYPES = ['grass', 'road', 'water', 'road', 'grass'];

    function makeLane(row) {
        const types = ['grass', 'road', 'road', 'water', 'road'];
        const type = row === 0 ? 'grass' : types[Math.floor(Math.random() * types.length)];
        const speed = (0.5 + Math.random() * 2) * (Math.random() < 0.5 ? 1 : -1);
        const obstacles = [];
        
        if (type === 'road') {
            const count = 2 + Math.floor(Math.random() * 3);
            for (let i = 0; i < count; i++) {
                const len = 1 + Math.floor(Math.random() * 2);
                obstacles.push({
                    x: Math.random() * COLS * CW,
                    w: len * CW,
                    h: CH * 0.7
                });
            }
        } else if (type === 'water') {
            const count = 2 + Math.floor(Math.random() * 2);
            for (let i = 0; i < count; i++) {
                obstacles.push({
                    x: Math.random() * COLS * CW,
                    w: (2 + Math.floor(Math.random() * 2)) * CW,
                    h: CH * 0.7
                });
            }
        }
        return { type, speed, obstacles, row };
    }

    function startGame() {
        player = { col: Math.floor(COLS / 2), row: 0 };
        score = 0;
        gameOver = false;
        cameraY = 0;
        lanes = [];
        for (let i = -2; i < 30; i++) {
            lanes.push(makeLane(i));
        }
        document.getElementById('score').textContent = 0;
        requestAnimationFrame(loop);
    }

    function move(dx, dy) {
        if (gameOver) { startGame(); return; }
        const newCol = player.col + dx;
        const newRow = player.row + dy;
        if (newCol < 0 || newCol >= COLS) return;
        player.col = newCol;
        player.row = newRow;

        if (-player.row > score) {
            score = -player.row;
            document.getElementById('score').textContent = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('crossy_best', bestScore);
                document.getElementById('best').textContent = bestScore;
            }
        }
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft') move(-1, 0);
        else if (e.key === 'ArrowRight') move(1, 0);
        else if (e.key === 'ArrowUp') move(0, -1);
        else if (e.key === 'ArrowDown') move(0, 1);
    });

    // Swipe support
    let touchStart = null;
    canvas.addEventListener('touchstart', e => {
        touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    });
    canvas.addEventListener('touchend', e => {
        if (!touchStart) return;
        const dx = e.changedTouches[0].clientX - touchStart.x;
        const dy = e.changedTouches[0].clientY - touchStart.y;
        if (Math.abs(dx) > Math.abs(dy)) {
            move(dx > 0 ? 1 : -1, 0);
        } else if (Math.abs(dy) > 20) {
            move(0, dy > 0 ? 1 : -1);
        }
        touchStart = null;
    });

    function getLane(row) {
        return lanes.find(l => l.row === row);
    }

    function loop() {
        if (gameOver) return;
        update();
        draw();
        requestAnimationFrame(loop);
    }

    function update() {
        // Move obstacles
        for (const lane of lanes) {
            for (const ob of lane.obstacles) {
                ob.x += lane.speed;
                if (ob.x > W + ob.w) ob.x = -ob.w;
                if (ob.x < -ob.w) ob.x = W;
            }
        }

        // Generate more lanes ahead
        const furthest = Math.min(...lanes.map(l => l.row));
        while (furthest > player.row - 15) {
            const newRow = Math.min(...lanes.map(l => l.row)) - 1;
            lanes.push(makeLane(newRow));
            break;
        }
        // Prune old lanes
        lanes = lanes.filter(l => l.row < player.row + 5);

        // Camera follows player
        cameraY += ((-player.row * CH - H * 0.6) - cameraY) * 0.1;

        // Collision check
        const lane = getLane(player.row);
        if (lane) {
            const px = player.col * CW + CW / 2;
            if (lane.type === 'road') {
                for (const ob of lane.obstacles) {
                    const ox = ((ob.x % (W + ob.w)) + W + ob.w) % (W + ob.w) - ob.w;
                    if (px > ob.x && px < ob.x + ob.w) {
                        endGame();
                        return;
                    }
                }
            } else if (lane.type === 'water') {
                let onLog = false;
                for (const ob of lane.obstacles) {
                    if (px > ob.x && px < ob.x + ob.w) {
                        onLog = true;
                        player.col += lane.speed / CW * 0.3;
                        if (player.col < 0 || player.col >= COLS) { endGame(); return; }
                    }
                }
                if (!onLog) { endGame(); return; }
            }
        }
    }

    function endGame() {
        gameOver = true;
        drawGameOver();
    }

    function draw() {
        ctx.fillStyle = '#1a0a2e';
        ctx.fillRect(0, 0, W, H);

        ctx.save();
        ctx.translate(0, -cameraY);

        // Draw lanes
        for (const lane of lanes) {
            const y = lane.row * CH;
            if (lane.type === 'grass') {
                ctx.fillStyle = lane.row % 2 === 0 ? '#2d5a1e' : '#357a24';
            } else if (lane.type === 'road') {
                ctx.fillStyle = lane.row % 2 === 0 ? '#444' : '#555';
            } else {
                ctx.fillStyle = lane.row % 2 === 0 ? '#1a5276' : '#1f6090';
            }
            ctx.fillRect(0, y, W, CH);

            // Draw obstacles
            for (const ob of lane.obstacles) {
                if (lane.type === 'road') {
                    ctx.fillStyle = ['#e74c3c', '#3498db', '#f39c12', '#9b59b6'][Math.abs(lane.row) % 4];
                    const ry = y + CH * 0.15;
                    ctx.fillRect(ob.x, ry, ob.w, ob.h);
                    // Wheels
                    ctx.fillStyle = '#222';
                    ctx.fillRect(ob.x + 4, ry + ob.h - 6, 10, 6);
                    ctx.fillRect(ob.x + ob.w - 14, ry + ob.h - 6, 10, 6);
                } else if (lane.type === 'water') {
                    ctx.fillStyle = '#8B6914';
                    ctx.fillRect(ob.x, y + CH * 0.15, ob.w, ob.h);
                    ctx.fillStyle = '#A07818';
                    ctx.fillRect(ob.x + 3, y + CH * 0.15 + 3, ob.w - 6, ob.h - 6);
                }
            }

            // Road markings
            if (lane.type === 'road') {
                ctx.setLineDash([15, 15]);
                ctx.strokeStyle = '#fff3';
                ctx.beginPath();
                ctx.moveTo(0, y + CH / 2);
                ctx.lineTo(W, y + CH / 2);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        // Draw player (chicken)
        const px = player.col * CW;
        const py = player.row * CH;
        ctx.font = `${CW * 0.8}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🐔', px + CW / 2, py + CH / 2);

        ctx.restore();
    }

    function drawGameOver() {
        draw();
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#ff6b9d';
        ctx.font = 'bold 36px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('💀 Game Over!', W / 2, H / 2 - 30);
        ctx.fillStyle = 'white';
        ctx.font = '22px sans-serif';
        ctx.fillText(`Score: ${score}`, W / 2, H / 2 + 15);
        ctx.font = '16px sans-serif';
        ctx.fillStyle = '#aaa';
        ctx.fillText('Press any key or tap to restart', W / 2, H / 2 + 50);
    }

    startGame();
    </script>
</body>
</html>

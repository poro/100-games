<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>065 - Connect Four</title>
    <style>
        body {
            font-family: 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0077b6;
            color: #fff;
        }
        .container {
            text-align: center;
        }
        #game-board {
            display: grid;
            grid-template-columns: repeat(7, 50px);
            grid-gap: 5px;
            background-color: #003049;
            padding: 10px;
            border-radius: 10px;
        }
        .cell {
            width: 50px;
            height: 50px;
            background-color: #fff;
            border-radius: 50%;
            cursor: pointer;
        }
        .player1 {
            background-color: #d62828;
        }
        .player2 {
            background-color: #f77f00;
        }
        #message {
            margin-top: 20px;
            font-size: 1.5rem;
        }
        button#reset {
            margin-top: 10px;
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            background-color: #fcbf49;
            color: #003049;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Connect Four</h1>
        <div id="game-board"></div>
        <div id="message">Player 1's turn</div>
        <button id="reset">Reset Game</button>
    </div>

    <script>
        const boardElement = document.getElementById('game-board');
        const messageElement = document.getElementById('message');
        const resetButton = document.getElementById('reset');
        const rows = 6;
        const cols = 7;
        let board = [];
        let currentPlayer = 1;
        let gameOver = false;

        function createBoard() {
            board = Array(rows).fill(null).map(() => Array(cols).fill(0));
            boardElement.innerHTML = '';
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.addEventListener('click', () => placePiece(c));
                    boardElement.appendChild(cell);
                }
            }
        }

        function placePiece(col) {
            if (gameOver) return;
            for (let r = rows - 1; r >= 0; r--) {
                if (board[r][col] === 0) {
                    board[r][col] = currentPlayer;
                    updateBoard();
                    if (checkWin(r, col)) {
                        messageElement.innerText = `Player ${currentPlayer} wins!`;
                        gameOver = true;
                    } else if (board.flat().every(cell => cell !== 0)) {
                        messageElement.innerText = 'It\'s a draw!';
                        gameOver = true;
                    } else {
                        currentPlayer = currentPlayer === 1 ? 2 : 1;
                        messageElement.innerText = `Player ${currentPlayer}'s turn`;
                    }
                    return;
                }
            }
        }

        function updateBoard() {
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = boardElement.querySelector(`[data-row='${r}'][data-col='${c}']`);
                    cell.classList.remove('player1', 'player2');
                    if (board[r][c] === 1) {
                        cell.classList.add('player1');
                    } else if (board[r][c] === 2) {
                        cell.classList.add('player2');
                    }
                }
            }
        }

        function checkWin(row, col) {
            const player = board[row][col];
            // Check horizontal, vertical, and both diagonals
            const directions = [
                { r: 0, c: 1 }, { r: 1, c: 0 }, { r: 1, c: 1 }, { r: 1, c: -1 }
            ];
            for (const dir of directions) {
                let count = 1;
                for (let i = 1; i < 4; i++) {
                    const r = row + dir.r * i;
                    const c = col + dir.c * i;
                    if (r >= 0 && r < rows && c >= 0 && c < cols && board[r][c] === player) {
                        count++;
                    } else {
                        break;
                    }
                }
                for (let i = 1; i < 4; i++) {
                    const r = row - dir.r * i;
                    const c = col - dir.c * i;
                    if (r >= 0 && r < rows && c >= 0 && c < cols && board[r][c] === player) {
                        count++;
                    } else {
                        break;
                    }
                }
                if (count >= 4) return true;
            }
            return false;
        }
        
        resetButton.addEventListener('click', () => {
            currentPlayer = 1;
            gameOver = false;
            messageElement.innerText = `Player ${currentPlayer}'s turn`;
            createBoard();
        });

        createBoard();
    </script>
</body>
</html>
